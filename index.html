async function callAI(prompt,sys){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,
        system:sys||"You are an elite startup advisor and venture analyst. Be sharp, direct, and actionable. Use plain text only — no markdown.",
        messages:[{role:"user",content:prompt}]})
    });
    if(!r.ok){const eb=await r.json().catch(()=>({}));throw new Error(eb.error&&eb.error.message||"HTTP "+r.status);}
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return (d.content&&d.content[0]&&d.content[0].text)||"No response received.";
  }catch(e){
    return getMockAI(prompt);
  }
}

function getMockAI(p){
  p=(p||"").toLowerCase();
  if(p.includes("trend")||p.includes("sector")||p.includes("growth potential")){
    return "1. AI Infrastructure & DevTools (Very High)\nEnterprise AI adoption is exploding and every company needs tooling to deploy, monitor, and optimize LLMs in production. Massive unmet demand in observability and cost control.\n\n2. Climate Tech / Energy Transition (Very High)\nGovernment mandates and falling renewable costs are driving trillions in investment. Biggest gaps are grid software, industrial decarbonization, and carbon accounting.\n\n3. Healthcare AI (High)\nFDA fast-tracking AI diagnostics, drug discovery timelines compressing from 12 years to under 5. Clinical workflow automation is severely underserved.\n\n4. B2B Fintech & Embedded Finance (High)\nEvery SaaS product is becoming a financial product. SMB banking, invoice financing, and embedded lending are growing 40% YoY with strong margins.\n\n5. Robotics & Physical AI (High)\nManufacturing labor shortages plus falling hardware costs make this the decade of physical automation. Warehouse, logistics, and last-mile delivery lead the wave.";
  }
  if(p.includes("90-day")||p.includes("roadmap")||p.includes("execution")){
    return "Week 1-2 — Foundation:\nDefine your ICP with brutal specificity. Interview 20 target customers this week. Set up domain, auth, database, CI/CD pipeline. Pick one north star metric.\n\nWeek 3-6 — Build:\nShip the narrowest possible MVP that solves the core pain. No extras. Get 3 design partners using it daily. Iterate weekly based on real feedback sessions.\n\nWeek 7-10 — Launch:\nProductize the MVP with proper onboarding. Launch on Product Hunt and 3 relevant communities. Target 50 signups and 10 weekly active users. Track one metric obsessively.\n\nWeek 11-12 — Scale & Iterate:\nConvert best design partners to paying customers. Build one repeatable acquisition channel. Document what is working and decide your next 90-day focus.";
  }
  if(p.includes("suggestion")||p.includes("improvement")||p.includes("5 specific")){
    return "1. Narrow your ICP ruthlessly. Pick one job title in one industry in one company size. Be the undisputed best solution for them before expanding. Broad TAM kills early startups.\n\n2. Reprice around value delivered, not features. Charge based on ROI — time saved, revenue generated. Seat-based or usage pricing leaves most value on the table.\n\n3. Add a free tier with a hard paywall at the exact moment users realize the product works. That friction converts curiosity into urgency.\n\n4. Build one public case study from your first customers with specific quantified results. This single asset will outperform any marketing campaign you run.\n\n5. Create a community around the problem you solve — not around your product. A Slack group or newsletter of practitioners makes you the trusted source and customers find you.";
  }
  if(p.includes("validation")||p.includes("biggest strength")||p.includes("critical question")){
    return "Biggest Strength:\nYou are solving a real, recurring pain that costs businesses measurable time or money right now. The problem is validated by the ugly workarounds people already use daily.\n\nBiggest Risk:\nThe solution sounds logical but has not been pressure-tested with real users under real conditions. Most assumptions about user behavior will be wrong until disproven through usage.\n\nCritical Questions to Answer Before Building:\n1. Will people pay for this today, or only express interest? Get a signed letter of intent or pre-order before writing a line of code.\n2. Why has this not been built well before? If the problem is obvious, why has no one solved it? The answer reveals where the real difficulty lies.\n3. What does success look like in 18 months, and what is the single metric that proves it is working?";
  }
  if(p.includes("analysis")||p.includes("strength")||p.includes("risk")||p.includes("competitive")){
    return "Key Strengths:\n1. Solves a genuine painful problem with clear urgency — users feel this friction daily and existing solutions are inadequate\n2. AI-native approach gives a structural 10x advantage over legacy software incumbents who cannot easily retrofit\n3. B2B SaaS model creates predictable recurring revenue with strong net revenue retention potential\n\nKey Risks:\n1. Enterprise sales cycles are long — budget 6-12 months and significant CAC before reaching meaningful revenue\n2. AI accuracy must be near-perfect or trust erodes permanently — one bad output damages credibility more than ten good ones build it\n3. Well-funded incumbents may bundle a version of this into existing platforms at zero marginal cost to them\n\nMain Competitive Threat:\nMicrosoft or Google adding this as a feature to their existing enterprise suite and distributing to millions of existing customers overnight.\n\nContrarian Insight:\nThe real moat is not the AI model — it is the proprietary training data you accumulate from every customer interaction. Design your data flywheel from day one, not as an afterthought.";
  }
  if(p.includes("mentor")||p.includes("advice")||p.includes("growth opportunit")){
    return "Growth Opportunities:\n1. Your domain expertise is an unfair advantage most founders waste. Use it to build credibility before you have traction — write, speak, or teach publicly about the problem space. Customers and investors find you.\n2. Find one experienced operator (not just an advisor) in your target market who will be brutally honest. One great mentor who answers your calls is worth more than ten big names on an advisory board.\n3. Pick one distribution channel and master it completely before diversifying. Most successful early-stage startups are 80% go-to-market and 20% product.\n\nSkill Gap to Address:\nThe transition from builder to seller is the hardest leap most technical founders face. Practice talking to strangers about your idea, handling objections, and ending conversations with a concrete next step. Avoiding this is the most common reason strong products fail.\n\nStartup Idea to Explore:\nConsider building a vertical AI tool for the industry you already know deeply. Domain expertise plus AI is a combination that is genuinely defensible — generic AI tools get commoditized fast, but deep vertical knowledge does not.";
  }
  return "AI analysis is running in offline mode. The platform tries to connect to the Anthropic API but browser security (CORS) blocks direct calls. All core features — submit ideas, vote, comment, collaborate, and view reports — work fully. To enable live AI, deploy a simple backend proxy.";
}

function ScoreArc({score,size,label}){

    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="4"/>

      style={{background:hov?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.025)",
        border:"1px solid "+(hov?"rgba(255,255,255,0.11)":"rgba(255,255,255,0.06)"),
        borderRadius:"var(--r2)",padding:"20px 20px 16px",cursor:"pointer",
        transition:"all .25s ease",transform:hov?"translateY(-3px)":"none",
        position:"relative",overflow:"hidden",
        animation:"fadeUp .4s ease both",animationDelay:(index*0.055)+"s"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"1.5px",
        background:"linear-gradient(90deg,transparent,"+scoreColor(idea.aiScore)+"66,transparent)",
        opacity:hov?1:0.4,transition:"opacity .3s"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div style={{flex:1,marginRight:12,minWidth:0}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:9}}>
            <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,letterSpacing:0.7,background:sc.bg,color:sc.c}}>{idea.status.toUpperCase()}</span>
            <Pill>{idea.industry}</Pill>
          </div>
          <h3 style={{fontSize:14,fontWeight:700,color:"var(--text)",lineHeight:1.35,fontFamily:"var(--fd)",letterSpacing:-0.2,wordBreak:"break-word"}}>{idea.title}</h3>
        </div>
        <ScoreArc score={idea.aiScore} size={50}/>
      </div>
      <p style={{fontSize:12,color:"var(--text2)",lineHeight:1.65,marginBottom:12}}>{idea.problem.slice(0,90)}...</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
        {(idea.tags||[]).slice(0,3).map(function(t){return <Pill key={t} accent="rgba(167,139,250,.6)">{"#"+t}</Pill>;})}
      </div>
      <div style={{height:1,background:"rgba(255,255,255,0.05)",margin:"0 0 12px"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <Av initials={idea.author.split(" ").map(function(n){return n[0];}).join("")} size={26} role={idea.authorRole}/>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text)"}}>{idea.author}</div>
            <div style={{fontSize:10,color:roleColor[idea.authorRole]}}>{idea.authorRole}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,fontSize:11,color:"var(--text3)"}}>
          <span>{"👁 "+idea.views.toLocaleString()}</span>
          <span style={{color:"var(--accent3)"}}>{"✓ "+pct+"%"}</span>
          <span>{"💬 "+((idea.comments||[]).length)}</span>
        </div>
      </div>
    </div>
  );
}

function IdeaDetail({idea,user,onBack,onVote,onComment,onLike,onCollab}){
  const [tab,setTab]=useState("overview");
  const [comment,setComment]=useState("");
  const [replyTo,setReplyTo]=useState(null);
  const [replyText,setReplyText]=useState("");
  const [voted,setVoted]=useState(null);
  const [collabRole,setCollabRole]=useState("");
  const [collabMsg,setCollabMsg]=useState("");
  const [collabSent,setCollabSent]=useState(false);
  const [aiState,setAiState]=useState({});
  const [loading,setLoading]=useState({});

  var fetchAI=async function(type){
    if(loading[type]||aiState[type])return;
    setLoading(function(l){return Object.assign({},l,{[type]:true});});
    var prompts={
      analysis:"Analyze startup: \""+idea.title+"\"\nProblem: "+idea.problem+"\nSolution: "+idea.solution+"\nMarket: "+idea.marketSize+"\nMonetization: "+idea.monetization+"\n\nVenture analysis with: 3 key strengths, 3 key risks, main competitive threat, one contrarian insight. Direct and sharp. Under 300 words. Plain text only.",
      roadmap:"90-day execution roadmap for: \""+idea.title+"\"\nProblem: "+idea.problem+"\nSolution: "+idea.solution+"\n\nOrganize by: Week 1-2 Foundation, Week 3-6 Build, Week 7-10 Launch, Week 11-12 Scale. List specific concrete tasks. Under 300 words. Plain text only.",
      suggestions:"5 specific actionable improvements for: \""+idea.title+"\"\nProblem: "+idea.problem+"\nMonetization: "+idea.monetization+"\n\nFocus on market positioning, product differentiation, revenue model. Be specific. Under 280 words. Plain text only.",
      trends:"Current market trends for "+idea.industry+" relevant to: \""+idea.title+"\"\n\n5 specific trends with data points. Explain opportunity or risk for this startup. Under 280 words. Plain text only.",
    };
    var t=await callAI(prompts[type]);
    setAiState(function(s){return Object.assign({},s,{[type]:t});});
    setLoading(function(l){return Object.assign({},l,{[type]:false});});
  };

  var handleVote=function(type){if(!voted){setVoted(type);onVote(idea.id,type);}};
  var handleComment=function(){if(comment.trim()){onComment(idea.id,comment);setComment("");}};
  var handleReply=function(){if(replyText.trim()){onComment(idea.id,replyText,replyTo);setReplyText("");setReplyTo(null);}};
  var handleCollab=function(){
    if(!collabRole){alert("Please select a role first.");return;}
    var ideaAuthor=SEED_USERS.find(function(u){return u.id===idea.authorId;})||{id:idea.authorId,name:idea.author,role:idea.authorRole,avatar:(idea.author||"").split(" ").map(function(n){return n[0]||"";}).join("").slice(0,2)||"??"};
    onCollab(idea.id,collabRole,collabMsg||"Hi! I want to collaborate on your idea as a "+collabRole+".",ideaAuthor);
    setCollabSent(true);
  };

  var tabs=[{id:"overview",label:"Overview"},{id:"ai",label:"AI Report"},{id:"discuss",label:"Discussion ("+idea.comments.length+")"},{id:"team",label:"Team"}];
  var voteOpts=[{key:"high",label:"High Potential",color:"var(--accent3)"},{key:"improve",label:"Needs Work",color:"#ffa94d"},{key:"notViable",label:"Not Viable",color:"var(--accent2)"}];
  var sc=statusCfg[idea.status]||statusCfg.New;

  return(
    <div className="page-enter" style={{maxWidth:900,margin:"0 auto"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,marginBottom:24,padding:"6px 0",transition:"color .2s"}} onMouseEnter={function(e){e.currentTarget.style.color="var(--text)";}} onMouseLeave={function(e){e.currentTarget.style.color="var(--text3)";}}>
        ← Back to Ideas
      </button>
      <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"var(--r3)",padding:"clamp(18px,4vw,30px)",marginBottom:16,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#a78bfa,#4f9fff,#4fffb0)"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:14,marginBottom:20}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:11}}>
              <span style={{padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700,letterSpacing:0.7,background:sc.bg,color:sc.c}}>{idea.status.toUpperCase()}</span>
              <Pill>{idea.industry}</Pill>
            </div>
            <h1 style={{fontSize:"clamp(18px,3.5vw,24px)",fontWeight:700,color:"var(--text)",lineHeight:1.25,marginBottom:14,fontFamily:"var(--fd)",letterSpacing:-0.4,wordBreak:"break-word"}}>{idea.title}</h1>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Av initials={idea.author.split(" ").map(function(n){return n[0];}).join("")} size={36} role={idea.authorRole}/>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{idea.author}</div>
                <div style={{fontSize:11,color:roleColor[idea.authorRole]}}>{idea.authorRole+" · "+idea.createdAt}</div>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:16,alignItems:"center",flexShrink:0}}>
            <ScoreArc score={idea.aiScore} size={66} label="AI Score"/>
            <ScoreArc score={idea.validationScore} size={66} label="Community"/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {voteOpts.map(function(v){return(
            <button key={v.key} onClick={function(){handleVote(v.key);}}
              style={{padding:"9px 14px",borderRadius:10,cursor:voted?"default":"pointer",fontSize:12,fontWeight:600,transition:"all .2s",
                border:"1px solid "+(voted===v.key?v.color:"rgba(255,255,255,0.09)"),
                background:voted===v.key?v.color+"18":"rgba(255,255,255,0.03)",
                color:voted===v.key?v.color:"var(--text2)",
                opacity:voted&&voted!==v.key?0.5:1}}>
              {v.label+" ("+(idea.votes[v.key]+(voted===v.key?1:0))+")"}
            </button>
          );})}
        </div>
        {voted&&<div style={{marginTop:10,fontSize:12,color:"var(--accent3)"}}>Your vote was recorded. Thank you!</div>}
      </div>
      <div style={{display:"flex",gap:3,marginBottom:16,background:"rgba(255,255,255,0.025)",padding:4,borderRadius:"var(--r)",border:"1px solid var(--border)"}}>
        {tabs.map(function(t){return(
          <button key={t.id} onClick={function(){setTab(t.id);}}
            style={{flex:1,padding:"9px 8px",borderRadius:10,border:"none",cursor:"pointer",fontSize:"clamp(10px,2vw,12px)",fontWeight:600,transition:"all .2s",
              background:tab===t.id?"rgba(167,139,250,0.15)":"transparent",color:tab===t.id?"#a78bfa":"var(--text3)"}}>
            {t.label}
          </button>
        );})}
      </div>

      {tab==="overview"&&(
        <div style={{display:"grid",gap:10,animation:"fadeUp .3s ease"}}>
          {[{label:"Problem",text:idea.problem},{label:"Solution",text:idea.solution},{label:"Target Users",text:idea.targetUsers},{label:"Market Size",text:idea.marketSize},{label:"Monetization",text:idea.monetization}].map(function(item){return(
            <Card key={item.label}>
              <SecLabel>{item.label}</SecLabel>
              <p style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.75,margin:0}}>{item.text||"Not specified"}</p>
            </Card>
          );})}
          <Card>
            <SecLabel>Tags</SecLabel>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {(idea.tags||[]).map(function(t){return <Pill key={t} accent="rgba(167,139,250,.6)">{"#"+t}</Pill>;})}
              {(!idea.tags||idea.tags.length===0)&&<span style={{fontSize:12,color:"var(--text3)"}}>No tags</span>}
            </div>
          </Card>
          {(idea.seeking||[]).length>0&&(
            <Card>
              <SecLabel>Seeking Collaborators</SecLabel>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {idea.seeking.map(function(r){return <span key={r} style={{padding:"5px 12px",borderRadius:10,background:(roleColor[r]||"#a78bfa")+"14",border:"1px solid "+(roleColor[r]||"#a78bfa")+"28",color:roleColor[r]||"#a78bfa",fontSize:12,fontWeight:600}}>{r}</span>;})}
              </div>
            </Card>
          )}
        </div>
      )}

      {tab==="ai"&&(
        <div style={{display:"grid",gap:10,animation:"fadeUp .3s ease"}}>
          <Card>
            <SecLabel>Performance Metrics</SecLabel>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(100%,230px),1fr))",gap:"2px 28px"}}>
              <Bar label="Market Demand" val={idea.report.marketDemand} color="var(--accent3)"/>
              <Bar label="Monetization Potential" val={idea.report.monetization} color="#a78bfa"/>
              <Bar label="Scalability" val={idea.report.scalability} color="var(--accent4)"/>
              <Bar label="Success Probability" val={idea.report.success} color="var(--accent)"/>
              <Bar label="Competition (lower=better)" val={idea.report.competition} color="#fb923c"/>
              <Bar label="Investor Readiness" val={idea.report.investor} color="#f9a8d4"/>
            </div>
            <div style={{marginTop:14,padding:"10px 14px",background:"rgba(255,79,123,0.07)",borderRadius:10,border:"1px solid rgba(255,79,123,0.15)"}}>
              <span style={{fontSize:12,color:"var(--text2)"}}>Risk Level: </span>
              <span style={{fontSize:13,fontWeight:700,color:scoreColor(100-idea.report.risk)}}>{idea.report.risk+"% — "+(idea.report.risk<35?"Low Risk":idea.report.risk<55?"Moderate Risk":"High Risk")}</span>
            </div>
          </Card>
          {(idea.report.competitors||[]).length>0&&(
            <Card>
              <SecLabel>Known Competitors</SecLabel>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {idea.report.competitors.map(function(c){return <div key={c} style={{padding:"7px 13px",borderRadius:10,background:"rgba(255,79,123,0.08)",border:"1px solid rgba(255,79,123,0.18)",fontSize:12,color:"#ff7a9a",fontWeight:600}}>{c}</div>;})}
              </div>
            </Card>
          )}
          {(idea.report.roadmap||[]).length>0&&(
            <Card>
              <SecLabel>Suggested Roadmap</SecLabel>
              {idea.report.roadmap.map(function(step,i){return(
                <div key={i} style={{display:"flex",gap:12,marginBottom:11,alignItems:"flex-start"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:"rgba(167,139,250,0.15)",border:"1px solid rgba(167,139,250,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#a78bfa",flexShrink:0}}>{i+1}</div>
                  <span style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,paddingTop:2}}>{step}</span>
                </div>
              );})}
            </Card>
          )}
          {(idea.report.stack||[]).length>0&&(
            <Card>
              <SecLabel>Recommended Tech Stack</SecLabel>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {idea.report.stack.map(function(t){return <div key={t} style={{padding:"7px 13px",borderRadius:10,background:"rgba(79,159,255,0.08)",border:"1px solid rgba(79,159,255,0.18)",fontSize:12,color:"#7ab8ff",fontWeight:600}}>{t}</div>;})}
              </div>
            </Card>
          )}
          {[{key:"analysis",label:"Deep AI Analysis",hint:"Get a full venture-grade analysis"},{key:"roadmap",label:"Custom 90-Day Roadmap",hint:"Step-by-step execution plan"},{key:"suggestions",label:"AI Improvement Suggestions",hint:"5 actionable improvements"},{key:"trends",label:"Live Market Trend Analysis",hint:"Current market trends for this sector"}].map(function(sec){return(
            <div key={sec.key} style={{background:"rgba(167,139,250,0.04)",borderRadius:"var(--r2)",padding:"20px 22px",border:"1px solid rgba(167,139,250,0.12)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:10,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:13,color:"#a78bfa",fontWeight:700,marginBottom:3}}>{sec.label}</div>
                  {!aiState[sec.key]&&!loading[sec.key]&&<div style={{fontSize:11,color:"var(--text3)"}}>{sec.hint}</div>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  {aiState[sec.key]&&<button onClick={function(){setAiState(function(s){var n=Object.assign({},s);delete n[sec.key];return n;});}} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:11}}>Regenerate</button>}
                  {!aiState[sec.key]&&!loading[sec.key]&&<Btn onClick={function(){fetchAI(sec.key);}} style={{padding:"7px 14px",fontSize:11}}>Generate</Btn>}
                </div>
              </div>
              {loading[sec.key]&&<Spinner/>}
              {aiState[sec.key]&&<p style={{fontSize:13,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>{aiState[sec.key]}</p>}
              {!aiState[sec.key]&&!loading[sec.key]&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>Click Generate for live AI-powered insights.</p>}
            </div>
          );})}
        </div>
      )}

      {tab==="discuss"&&(
        <div style={{animation:"fadeUp .3s ease"}}>
          <Card style={{marginBottom:14}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <Av initials={user.avatar} size={34} role={user.role}/>
              <div style={{flex:1}}>
                <textarea value={comment} onChange={function(e){setComment(e.target.value);}} placeholder="Share your thoughts, feedback, or expertise..." rows={3}
                  style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontSize:13,lineHeight:1.7,resize:"vertical",padding:"10px 12px"}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                  <span style={{fontSize:11,color:"var(--text3)"}}>{comment.length+"/500"}</span>
                  <Btn onClick={handleComment} disabled={!comment.trim()||comment.length>500} style={{padding:"8px 18px",fontSize:12}}>Post Comment</Btn>
                </div>
              </div>
            </div>
          </Card>
          {idea.comments.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--text3)",fontSize:13}}>No comments yet. Be the first!</div>}
          {idea.comments.map(function(c){return(
            <div key={c.id} style={{marginBottom:12}}>
              <Card>
                <div style={{display:"flex",gap:10}}>
                  <Av initials={c.avatar} size={32} role="Founder"/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
                      <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{c.user}</span>
                      <span style={{fontSize:11,color:"var(--text3)"}}>{c.time}</span>
                    </div>
                    <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,margin:"0 0 10px",wordBreak:"break-word"}}>{c.text}</p>
                    <div style={{display:"flex",gap:14,alignItems:"center"}}>
                      <button onClick={function(){onLike(idea.id,c.id);}}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:c.liked?"#ff4f7b":"var(--text3)",display:"flex",alignItems:"center",gap:4}}>
                        {c.liked?"❤️":"🤍"} {c.likes}
                      </button>
                      <button onClick={function(){setReplyTo(replyTo===c.id?null:c.id);}}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:replyTo===c.id?"#a78bfa":"var(--text3)"}}>
                        Reply
                      </button>
                    </div>
                    {replyTo===c.id&&(
                      <div style={{marginTop:10,display:"flex",gap:8,alignItems:"flex-start"}}>
                        <Av initials={user.avatar} size={26} role={user.role}/>
                        <div style={{flex:1}}>
                          <textarea value={replyText} onChange={function(e){setReplyText(e.target.value);}} placeholder={"Reply to "+c.user+"..."} rows={2}
                            style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontSize:12,resize:"none",padding:"8px 10px"}}/>
                          <div style={{display:"flex",gap:8,marginTop:6}}>
                            <Btn onClick={handleReply} disabled={!replyText.trim()} style={{padding:"6px 14px",fontSize:11}}>Reply</Btn>
                            <Btn onClick={function(){setReplyTo(null);setReplyText("");}} variant="secondary" style={{padding:"6px 14px",fontSize:11}}>Cancel</Btn>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </Card>
              {(c.replies||[]).map(function(r){return(
                <div key={r.id} style={{marginLeft:"clamp(20px,5vw,42px)",marginTop:8,background:"rgba(255,255,255,0.015)",borderRadius:12,padding:"13px 16px",border:"1px solid rgba(255,255,255,0.04)"}}>
                  <div style={{display:"flex",gap:8}}>
                    <Av initials={r.avatar} size={26} role="Developer"/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4,marginBottom:5}}>
                        <span style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{r.user}</span>
                        <span style={{fontSize:11,color:"var(--text3)"}}>{r.time}</span>
                      </div>
                      <p style={{fontSize:12.5,color:"var(--text2)",lineHeight:1.65,margin:"0 0 6px",wordBreak:"break-word"}}>{r.text}</p>
                      <button onClick={function(){onLike(idea.id,c.id,r.id);}}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:r.liked?"#ff4f7b":"var(--text3)",display:"flex",alignItems:"center",gap:3}}>
                        {r.liked?"❤️":"🤍"} {r.likes}
                      </button>
                    </div>
                  </div>
                </div>
              );})}
            </div>
          );})}
        </div>
      )}

      {tab==="team"&&(
        <div style={{animation:"fadeUp .3s ease",display:"grid",gap:12}}>
          <Card>
            <SecLabel>Join This Startup</SecLabel>
            {(idea.seeking||[]).length>0?(
              <>
                <p style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>Select a role and send a collaboration request:</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                  {idea.seeking.map(function(role){return(
                    <button key={role} onClick={function(){setCollabRole(collabRole===role?"":role);}}
                      style={{padding:"9px 16px",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:13,transition:"all .2s",
                        border:"1px solid "+(collabRole===role?roleColor[role]||"#a78bfa":"rgba(255,255,255,0.09)"),
                        background:collabRole===role?(roleColor[role]||"#a78bfa")+"18":"rgba(255,255,255,0.03)",
                        color:collabRole===role?roleColor[role]||"#a78bfa":"var(--text2)"}}>
                      {(collabRole===role?"✓ ":"")+role}
                    </button>
                  );})}
                </div>
                {collabRole&&!collabSent&&(
                  <>
                    <textarea value={collabMsg} onChange={function(e){setCollabMsg(e.target.value);}} placeholder={"Tell "+idea.author+" why you'd be a great "+collabRole+"..."} rows={3}
                      style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontSize:13,resize:"none",padding:"10px 12px",marginBottom:10}}/>
                    <Btn onClick={handleCollab} style={{width:"100%",padding:"12px"}}>{"Send Request as "+collabRole}</Btn>
                  </>
                )}
                {collabSent&&<div style={{padding:"14px 18px",background:"rgba(79,255,176,0.08)",borderRadius:12,border:"1px solid rgba(79,255,176,0.2)",color:"var(--accent3)",fontSize:13,fontWeight:600}}>{"Request sent to "+idea.author+"! They will review and respond."}</div>}
              </>
            ):<p style={{fontSize:13,color:"var(--text3)"}}>This idea is not currently seeking collaborators.</p>}
          </Card>
          <Card>
            <SecLabel>AI Co-founder Matches</SecLabel>
            <p style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>Matched by skill relevance and activity</p>
            {SEED_USERS.filter(function(u){return u.id!==idea.authorId;}).slice(0,4).map(function(u,i){return(

function SubmitIdea({onSubmit,onCancel}){

    if(!form.solution.trim())e.solution="Solution is required";

        <p style={{fontSize:13,color:"var(--text3)",marginBottom:24}}>AI will automatically score, analyze and match collaborators for your idea</p>

              <div>

            <div>

function Explore({ideas,onIdeaClick,onBack}){
  const [q,setQ]=useState("");const [ind,setInd]=useState("All");const [status,setStatus]=useState("All");const [sort,setSort]=useState("trending");
  var industries=["All",...new Set(ideas.map(function(i){return i.industry;}))];
  var filtered=ideas.filter(function(i){
    if(!q)return true;var ql=q.toLowerCase();
    return i.title.toLowerCase().includes(ql)||i.problem.toLowerCase().includes(ql)||(i.tags||[]).some(function(t){return t.toLowerCase().includes(ql);})||i.industry.toLowerCase().includes(ql)||(i.author||"").toLowerCase().includes(ql)||(i.solution||"").toLowerCase().includes(ql);
  }).filter(function(i){return ind==="All"||i.industry===ind;}).filter(function(i){return status==="All"||i.status===status;}).sort(function(a,b){
    if(sort==="score")return b.aiScore-a.aiScore;if(sort==="views")return b.views-a.views;if(sort==="newest")return new Date(b.createdAt)-new Date(a.createdAt);return b.votes.high-a.votes.high;
  });
  var sS={padding:"10px 12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text2)",fontSize:12,cursor:"pointer"};
  return(
    <div className="page-enter">
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:700,color:"var(--text)",fontFamily:"var(--fd)",letterSpacing:-0.5,marginBottom:4}}>Explore Ideas</h2>
        <p style={{fontSize:13,color:"var(--text3)"}}>Discover, validate, and collaborate on the next big thing</p>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
        <input value={q} onChange={function(e){setQ(e.target.value);}} placeholder="Search ideas, tags, problems..." style={{flex:1,minWidth:200,padding:"10px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text)",fontSize:13}}/>
        <select value={ind} onChange={function(e){setInd(e.target.value);}} style={sS}>{industries.map(function(i){return <option key={i}>{i}</option>;})}</select>
        <select value={status} onChange={function(e){setStatus(e.target.value);}} style={sS}>{["All","Trending","Hot","New"].map(function(s){return <option key={s}>{s}</option>;})}</select>
        <select value={sort} onChange={function(e){setSort(e.target.value);}} style={sS}>
          <option value="trending">Trending</option><option value="score">AI Score</option><option value="views">Most Viewed</option><option value="newest">Newest</option>
        </select>
      </div>
      <div style={{fontSize:11,color:"var(--text3)",marginBottom:14,letterSpacing:0.5}}>{filtered.length+" IDEA"+(filtered.length!==1?"S":"")+" FOUND"}</div>
      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text3)"}}>
          <div style={{fontSize:32,marginBottom:12}}>🔍</div>
          <div style={{fontSize:14,marginBottom:6}}>No ideas match your search</div>
          <div style={{fontSize:12}}>Try different keywords or clear the filters</div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,290px),1fr))",gap:14}}>
          {filtered.map(function(idea,i){return <IdeaCard key={idea.id} idea={idea} onClick={onIdeaClick} index={i}/>;})}</div>
      )}
    </div>
  );
}

          <div style={{position:"absolute",top:0,left:0,right:0,height:"1.5px",background:"linear-gradient(90deg,transparent,rgba(167,139,250,.5),transparent)"}}/>
          <div style={{display:"flex",background:"rgba(255,255,255,0.03)",borderRadius:12,padding:4,marginBottom:24}}>
            {["login","signup"].map(function(m){return <button key={m} onClick={function(){setMode(m);setErrors({});}} style={{flex:1,padding:"10px",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .2s",background:mode===m?"rgba(167,139,250,.15)":"transparent",color:mode===m?"#a78bfa":"var(--text3)"}}>{m==="login"?"Sign In":"Sign Up"}</button>;})}
          </div>
          <div style={{display:"grid",gap:10}}>
            {mode==="signup"&&<div>
              <input value={form.name} onChange={function(e){set("name",e.target.value);}} placeholder="Full Name" style={errors.name?eS:iS}/>
              {errors.name&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.name}</div>}
            </div>}
            <div>
              <input value={form.email} onChange={function(e){set("email",e.target.value);}} placeholder="Email address" style={errors.email?eS:iS}/>
              {errors.email&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.email}</div>}
            </div>
            <div>
              <input type="password" value={form.password} onChange={function(e){set("password",e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleSubmit();}} placeholder="Password" style={errors.password?eS:iS}/>
              {errors.password&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.password}</div>}
            </div>
            {mode==="signup"&&<>
              <select value={form.role} onChange={function(e){set("role",e.target.value);}} style={Object.assign({},iS,{background:"var(--bg2)",cursor:"pointer"})}>
                {["Founder","Developer","Designer","Marketer","Investor"].map(function(r){return <option key={r}>{r}</option>;})}
              </select>
              <input value={form.skills} onChange={function(e){set("skills",e.target.value);}} placeholder="Skills (e.g. React, Product, Growth)" style={iS}/>
              <input value={form.country} onChange={function(e){set("country",e.target.value);}} placeholder="Country" style={iS}/>
              <textarea value={form.bio} onChange={function(e){set("bio",e.target.value);}} placeholder="Short bio (optional)" rows={2} style={Object.assign({},iS,{resize:"none"})}/>
            </>}
            <button onClick={handleSubmit} disabled={submitting}
              style={{padding:"14px",borderRadius:12,border:"none",marginTop:4,cursor:submitting?"not-allowed":"pointer",fontWeight:700,fontSize:15,transition:"all .2s",
                background:submitting?"rgba(167,139,250,.4)":"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff",boxShadow:submitting?"none":"0 4px 20px rgba(167,139,250,.25)"}}>
              {submitting?"Signing in...":(mode==="login"?"Sign In":"Create Account")}
            </button>
            {mode==="login"&&<button onClick={function(){setSubmitting(true);setTimeout(function(){onLogin(SEED_USERS[0]);},400);}}
              style={{padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.03)",color:"var(--text2)",cursor:"pointer",fontSize:13}}>
              Continue as Demo User
            </button>}
          </div>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"var(--text3)",marginTop:16}}>Join 12,000+ founders, builders and investors · Free forever</p>
      </div>
    </div>
  );
}

function Toast({msg,type,onClose}){
  type=type||"success";
  useEffect(function(){var t=setTimeout(onClose,3500);return function(){clearTimeout(t);};},[]);
  var cfg={success:{bg:"rgba(79,255,176,.1)",border:"rgba(79,255,176,.25)",c:"var(--accent3)"},error:{bg:"rgba(255,79,123,.1)",border:"rgba(255,79,123,.25)",c:"var(--accent2)"},info:{bg:"rgba(167,139,250,.1)",border:"rgba(167,139,250,.25)",c:"#a78bfa"}};
  var s=cfg[type]||cfg.success;
  return <div style={{padding:"11px 16px",borderRadius:12,background:s.bg,border:"1px solid "+s.border,color:s.c,fontSize:13,fontWeight:600,backdropFilter:"blur(20px)",animation:"slideDown .3s ease",display:"flex",alignItems:"center",gap:8,maxWidth:320,wordBreak:"break-word"}}>
    {msg}
    <button onClick={onClose} style={{background:"none",border:"none",color:s.c,cursor:"pointer",fontSize:14,marginLeft:4,opacity:0.6}}>x</button>
  </div>;
}

function App(){
  // ── Persist session across refreshes ──────────────────────────────────────
  var loadState=function(){
    try{
      var u=localStorage.getItem("ldi_user");
      var id=localStorage.getItem("ldi_ideas");
      var cv=localStorage.getItem("ldi_convs");
      return {user:u?JSON.parse(u):null, ideas:id?JSON.parse(id):SEED_IDEAS, convs:cv?JSON.parse(cv):SEED_CONVS};
    }catch(e){return {user:null,ideas:SEED_IDEAS,convs:SEED_CONVS};}
  };
  var saved=loadState();

  const [user,setUser]=useState(saved.user);
  const [page,setPage]=useState("explore");
  const [history,setHistory]=useState([]);
  const [ideas,setIdeas]=useState(saved.ideas);
  const [convs,setConvs]=useState(saved.convs);
  const [activeConv,setActiveConv]=useState(null);
  const [showMessages,setShowMessages]=useState(false);
  const [selected,setSelected]=useState(null);
  const [toasts,setToasts]=useState([]);

  // Persist user
  useEffect(function(){
    try{
      if(user)localStorage.setItem("ldi_user",JSON.stringify(user));
      else localStorage.removeItem("ldi_user");
    }catch(e){}
  },[user]);

  // Persist ideas
  useEffect(function(){
    try{localStorage.setItem("ldi_ideas",JSON.stringify(ideas));}catch(e){}
  },[ideas]);

  // Persist convs
  useEffect(function(){
    try{localStorage.setItem("ldi_convs",JSON.stringify(convs));}catch(e){}
  },[convs]);

  var notify=function(msg,type){
    type=type||"success";var id=Date.now();
    setToasts(function(t){return [...t,{id,msg,type}];});
    setTimeout(function(){setToasts(function(t){return t.filter(function(x){return x.id!==id;});});},4500);
  };

  var navigate=function(pg,idea,replace){
    if(!replace){
      setHistory(function(h){
        // Don't push duplicate consecutive entries
        if(h.length>0&&h[h.length-1]===page)return h;
        return [...h,page];
      });
    }
    setPage(pg);
    if(idea)setSelected(idea);
    else if(pg!=="detail")setSelected(null);
    window.scrollTo({top:0,behavior:"smooth"});
  };

  var goBack=function(){
    setHistory(function(h){
      if(h.length===0){
        // No history left — on landing page, close/minimize (window.close or go to explore)
        try{window.close();}catch(e){}
        // If window.close doesn't work (most browsers block it), stay on explore
        setPage("explore");
        return h;
      }
      var prev=h[h.length-1];
      var newH=h.slice(0,-1);
      setPage(prev);
      if(prev!=="detail")setSelected(null);
      window.scrollTo({top:0,behavior:"smooth"});
      return newH;
    });
  };

  var handleSignOut=function(){
    setUser(null);
    setPage("explore");
    setSelected(null);
    try{localStorage.removeItem("ldi_user");}catch(e){}
  };

  useEffect(function(){
    if(selected){var fresh=ideas.find(function(i){return i.id===selected.id;});if(fresh)setSelected(fresh);}
  },[ideas]);

  var handleVote=function(ideaId,type){
    setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{votes:Object.assign({},i.votes,{[type]:i.votes[type]+1})}):i;});});
    notify("Vote recorded! +5 reputation earned","success");
  };

  var handleComment=function(ideaId,text,parentId){
    var nc={id:Date.now(),userId:user.id,user:user.name,avatar:user.avatar,text:text.trim(),likes:0,liked:false,time:"Just now",replies:[]};
    if(parentId){
      setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{comments:i.comments.map(function(c){return c.id===parentId?Object.assign({},c,{replies:[...c.replies,nc]}):c;})}):i;});});
    }else{
      setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{comments:[...i.comments,nc]}):i;});});
    }
    notify("Comment posted! +10 reputation","success");
  };

  var handleLike=function(ideaId,commentId,replyId){
    setIdeas(function(p){return p.map(function(i){
      if(i.id!==ideaId)return i;
      return Object.assign({},i,{comments:i.comments.map(function(c){
        if(c.id!==commentId)return c;
        if(replyId){return Object.assign({},c,{replies:c.replies.map(function(r){return r.id===replyId?Object.assign({},r,{likes:r.liked?r.likes-1:r.likes+1,liked:!r.liked}):r;})});}
        return Object.assign({},c,{likes:c.liked?c.likes-1:c.likes+1,liked:!c.liked});
      })});
    });});
  };

  var handleCollab=function(ideaId,role,message,otherUser){
    setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{collaborators:(i.collaborators||0)+1}):i;});});
    // Auto-create a conversation when collaboration request is sent
    if(otherUser&&message){
      var idea=ideas.find(function(i){return i.id===ideaId;});
      var existingConv=convs.find(function(c){
        return c.participants.includes(user.id)&&c.participants.includes(otherUser.id)&&c.ideaId===ideaId;
      });
      if(!existingConv){
        var newConv={
          id:"c"+Date.now(),
          participants:[user.id,otherUser.id],
          ideaId:ideaId,
          ideaTitle:idea?idea.title:"",
          lastMsg:message,
          lastTime:"Just now",
          unread:0,
          messages:[{id:"m"+Date.now(),from:user.id,text:message,time:"Just now",read:true}]
        };
        setConvs(function(cv){return [newConv,...cv];});
        setActiveConv(newConv.id);
        setShowMessages(true);
        notify("Collaboration request sent! Chat opened.","success");
        return;
      }
    }
    notify("Collaboration request sent as "+role+"! +30 reputation when approved.","success");
  };

  var handleSendMessage=function(convId,text){
    if(!text.trim())return;
    var newMsg={id:"m"+Date.now(),from:user.id,text:text.trim(),time:"Just now",read:true};
    setConvs(function(cv){return cv.map(function(c){
      if(c.id!==convId)return c;
      return Object.assign({},c,{messages:[...c.messages,newMsg],lastMsg:text.trim(),lastTime:"Just now"});
    });});
  };

  var handleOpenConv=function(convId){
    // Mark all as read
    setConvs(function(cv){return cv.map(function(c){
      if(c.id!==convId)return c;
      return Object.assign({},c,{unread:0,messages:c.messages.map(function(m){return Object.assign({},m,{read:true});})});
    });});
    setActiveConv(convId);
    setShowMessages(true);
  };

  var totalUnread=convs.reduce(function(acc,c){return acc+(c.unread||0);},0);

  var handleSubmitIdea=function(data){
    var ni=Object.assign({},data,{
      id:Date.now(),authorId:user.id,author:user.name,authorRole:user.role,
      votes:{high:0,improve:0,notViable:0},collaborators:0,views:1,comments:[],status:"New",
      createdAt:new Date().toISOString().slice(0,10),
      report:{marketDemand:data.aiScore||Math.floor(Math.random()*20+65),competition:Math.floor(Math.random()*30+45),monetization:Math.floor(Math.random()*20+65),scalability:Math.floor(Math.random()*20+65),risk:Math.floor(Math.random()*30+20),success:Math.floor(Math.random()*20+55),investor:Math.floor(Math.random()*30+45),competitors:[],trends:[],roadmap:[],stack:[]}
    });
    setIdeas(function(p){return [ni,...p];});
    setUser(function(u){return Object.assign({},u,{ideas:(u.ideas||0)+1,reputation:(u.reputation||0)+50});});
    notify("Idea submitted! AI analysis ready. +50 reputation","success");
    navigate("explore");
  };

  var navItems=[{id:"dashboard",label:"Home",icon:"⊞"},{id:"explore",label:"Explore",icon:"✦"},{id:"submit",label:"Launch",icon:"+"},{id:"messages",label:"Messages",icon:"✉"},{id:"profile",label:"Profile",icon:"◎"}];

  if(!user)return <Auth onLogin={function(u){setUser(u);setPage("explore");try{localStorage.setItem("ldi_user",JSON.stringify(u));}catch(e){}}}/>;

  return <>
    <div style={{position:"fixed",top:"5%",left:"5%",width:500,height:500,borderRadius:"50%",background:"rgba(167,139,250,.018)",filter:"blur(130px)",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"fixed",bottom:"10%",right:"5%",width:400,height:400,borderRadius:"50%",background:"rgba(79,255,176,.012)",filter:"blur(110px)",pointerEvents:"none",zIndex:0}}/>
    <nav style={{position:"sticky",top:0,zIndex:100,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(8,8,16,0.9)",backdropFilter:"blur(24px)"}}>
      <div style={{maxWidth:1400,margin:"0 auto",padding:"0 clamp(12px,3vw,24px)",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <button onClick={function(){navigate("dashboard");}} style={{background:"linear-gradient(135deg,#a78bfa,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",border:"none",cursor:"pointer",fontSize:19,fontWeight:700,fontFamily:"var(--fd)",letterSpacing:-0.8}}>LetsDoIt</button>
        <div style={{display:"flex",gap:2}}>
          {navItems.map(function(n){return(
            <button key={n.id} onClick={function(){if(n.id==="messages"){setShowMessages(true);setActiveConv(activeConv||(convs[0]&&convs[0].id)||null);}else{navigate(n.id);}}}
              style={{padding:"7px 9px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all .2s",position:"relative",
                background:(n.id==="messages"?showMessages:page===n.id&&page!=="detail")?"rgba(167,139,250,.12)":"transparent",
                color:(n.id==="messages"?showMessages:page===n.id&&page!=="detail")?"#a78bfa":"rgba(240,240,248,.4)"}}>
              <span style={{marginRight:3}}>{n.icon}</span><span className="nav-text">{n.label}</span>
              {n.id==="messages"&&totalUnread>0&&<span style={{position:"absolute",top:3,right:3,width:8,height:8,borderRadius:"50%",background:"#ff4f7b",border:"1px solid var(--bg)"}}/>}
            </button>
          );})}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="hide-mobile" style={{fontSize:12,color:"#fbbf24",fontWeight:700}}>{"⭐ "+user.reputation.toLocaleString()}</span>
          <button onClick={function(){navigate("profile");}} style={{background:"none",border:"none",cursor:"pointer",borderRadius:"50%",padding:0}}>
            <Av initials={user.avatar} size={30} role={user.role}/>
          </button>

        </div>
      </div>
    </nav>
    <div style={{position:"fixed",top:66,right:16,zIndex:999,display:"flex",flexDirection:"column",gap:8}}>
      {toasts.map(function(t){return <Toast key={t.id} msg={t.msg} type={t.type} onClose={function(){setToasts(function(ts){return ts.filter(function(x){return x.id!==t.id;});});}}/>;})}
    </div>
    <main style={{width:"100%",maxWidth:1400,margin:"0 auto",padding:"24px clamp(12px,3vw,24px) 60px",position:"relative",zIndex:1}}>
      {page==="dashboard"&&<Dashboard user={user} ideas={ideas} onIdeaClick={function(idea){navigate("detail",idea);}} onSubmit={function(){navigate("submit");}} onBack={function(){navigate("explore");}}/>}
      {page==="explore"&&<Explore ideas={ideas} onIdeaClick={function(idea){navigate("detail",idea);}}/>}
      {page==="submit"&&<SubmitIdea onSubmit={handleSubmitIdea} onCancel={function(){navigate("explore");}}/>}
      {page==="profile"&&<Profile user={user} onSignOut={handleSignOut} onBack={function(){navigate("explore");}}/>}
      {page==="detail"&&selected&&<IdeaDetail idea={selected} user={user} onBack={goBack} onVote={handleVote} onComment={handleComment} onLike={handleLike} onCollab={handleCollab}/>}
    </main>
    <footer style={{borderTop:"1px solid rgba(255,255,255,0.04)",padding:"16px 20px",textAlign:"center",position:"relative",zIndex:1}}>
      <span style={{fontSize:10,color:"var(--text3)",letterSpacing:0.8}}>LETSDOIT · AI-POWERED STARTUP COLLABORATION · WHERE IDEAS BECOME COMPANIES</span>
    </footer>
    {showMessages&&<MessagesPanel
      convs={convs}
      user={user}
      activeConv={activeConv}
      setActiveConv={function(id){handleOpenConv(id);}}
      onSend={handleSendMessage}
      onClose={function(){setShowMessages(false);}}
    />}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
 </html>
