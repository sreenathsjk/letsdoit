// ─── AI ENGINE ────────────────────────────────────────────────────────────────
async function callAI(prompt, systemPrompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt || "You are an elite startup advisor and venture analyst. Be concise, sharp, and actionable.",
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  return data.content?.[0]?.text || "";
}

function ScoreRing({ score, size = 64, label }) {
  const radius = (size / 2) - 6;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score / 100) * circumference;
  const color = scoreColor(score);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="5" />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth="5"
          strokeDasharray={circumference} strokeDashoffset={offset}
          style={{ transition: "stroke-dashoffset 1s ease", filter: `drop-shadow(0 0 6px ${color})` }} />
        <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
          style={{ fill: color, fontSize: size * 0.22, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", transform: "rotate(90deg)", transformOrigin: `${size/2}px ${size/2}px` }}>
          {score}
        </text>
      </svg>
      {label && <span style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", textTransform: "uppercase", letterSpacing: 1 }}>{label}</span>}
    </div>
  );
}

function BarMeter({ label, value, color }) {

      </div>
    </div>
  );
}

// ─── SUBMIT IDEA ──────────────────────────────────────────────────────────────
function SubmitIdea({ onSubmit, onCancel }) {
  const [form, setForm] = useState({
    title: "", problem: "", solution: "", targetUsers: "", marketSize: "",
    monetization: "", industry: "FinTech", tags: "", seeking: []
  });
  const [analyzing, setAnalyzing] = useState(false);
  const [preAnalysis, setPreAnalysis] = useState(null);
  const [step, setStep] = useState(1);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const industries = ["FinTech","LegalTech","HealthTech","EdTech","CleanTech","ProductivityTech","RetailTech","PropTech","DeepTech","ConsumerTech"];
  const roles = ["Co-founder","Developer","Designer","Marketer"];

  const analyzeIdea = async () => {
    if (!form.title || !form.problem) return;
    setAnalyzing(true);
    try {
      const text = await callAI(
        `Quick startup idea pre-validation for:
Title: ${form.title}
Problem: ${form.problem}
Solution: ${form.solution}

Give: 1 biggest strength, 1 biggest risk, and 3 key questions to answer before building. Under 200 words. Be direct.`
      );
      setPreAnalysis(text);
    } catch (e) {}
    setAnalyzing(false);
  };

  const handleSubmit = () => {
    if (!form.title || !form.problem || !form.solution) return;
    onSubmit({
      ...form,
      tags: form.tags.split(",").map(t => t.trim()).filter(Boolean),
      aiScore: Math.floor(Math.random() * 20 + 70),
      validationScore: Math.floor(Math.random() * 20 + 65),
    });
  };

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", animation: "fadeIn 0.3s ease" }}>
      <button onClick={onCancel} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", cursor: "pointer", padding: "8px 0", fontSize: 14, marginBottom: 24 }}>
        ← Cancel
      </button>
      <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 20, padding: 36, border: "1px solid rgba(255,255,255,0.08)", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "linear-gradient(90deg, #c084fc, #60a5fa)" }} />
        <h2 style={{ margin: "0 0 6px", fontSize: 24, fontWeight: 800, color: "#fff", fontFamily: "'Syne', sans-serif" }}>Submit Your Idea</h2>
        <p style={{ margin: "0 0 28px", color: "rgba(255,255,255,0.4)", fontSize: 14 }}>AI will automatically analyze and score your idea upon submission</p>

        {/* Progress steps */}
        <div style={{ display: "flex", gap: 8, marginBottom: 28 }}>
          {[1,2,3].map(s => (
            <div key={s} style={{ flex: 1, height: 4, borderRadius: 2, background: step >= s ? "linear-gradient(90deg,#c084fc,#818cf8)" : "rgba(255,255,255,0.08)", transition: "all 0.3s" }} />
          ))}
        </div>

        {step === 1 && (
          <div style={{ display: "grid", gap: 18 }}>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: "rgba(192,132,252,0.8)", letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Idea Title *</label>
              <input value={form.title} onChange={e => set("title", e.target.value)} placeholder="e.g. AI-powered X for Y market"
                style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: "rgba(192,132,252,0.8)", letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Problem Statement *</label>
              <textarea value={form.problem} onChange={e => set("problem", e.target.value)} placeholder="What painful problem are you solving? Be specific."
                style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", resize: "vertical", minHeight: 100, boxSizing: "border-box", fontFamily: "inherit" }} />
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: "rgba(192,132,252,0.8)", letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Proposed Solution *</label>
              <textarea value={form.solution} onChange={e => set("solution", e.target.value)} placeholder="How does your product solve this problem uniquely?"
                style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", resize: "vertical", minHeight: 100, boxSizing: "border-box", fontFamily: "inherit" }} />
            </div>
            <div style={{ display: "flex", gap: 16 }}>
              <div style={{ flex: 1 }}>

              <div style={{ flex: 1 }}>

                <input value={form.marketSize} onChange={e => set("marketSize", e.target.value)} placeholder="e.g. $5B TAM"

              </div>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 12, fontWeight: 700, color: "rgba(192,132,252,0.8)", letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Tags (comma-separated)</label>
                <input value={form.tags} onChange={e => set("tags", e.target.value)} placeholder="AI, B2B, SaaS, Marketplace"

// ─── EXPLORE / FEED ───────────────────────────────────────────────────────────
function Explore({ ideas, onIdeaClick }) {
  const [search, setSearch] = useState("");
  const [filterIndustry, setFilterIndustry] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [sort, setSort] = useState("trending");

  const industries = ["All", ...new Set(ideas.map(i => i.industry))];
  const statuses = ["All", "Trending", "Hot", "New"];

  const filtered = ideas
    .filter(i => {
      const q = search.toLowerCase();
      return (!q || i.title.toLowerCase().includes(q) || i.tags.some(t => t.toLowerCase().includes(q)));
    })
    .filter(i => filterIndustry === "All" || i.industry === filterIndustry)
    .filter(i => filterStatus === "All" || i.status === filterStatus)
    .sort((a, b) => {
      if (sort === "trending") return (b.votes.high - a.votes.high);
      if (sort === "score") return b.aiScore - a.aiScore;
      if (sort === "views") return b.views - a.views;
      if (sort === "newest") return new Date(b.createdAt) - new Date(a.createdAt);
      return 0;
    });

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ margin: "0 0 4px", fontSize: 24, fontWeight: 800, color: "#fff", fontFamily: "'Syne', sans-serif" }}>Explore Ideas</h2>
        <p style={{ margin: 0, color: "rgba(255,255,255,0.4)", fontSize: 14 }}>Discover, validate, and collaborate on the next big thing</p>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 22 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Search ideas, tags..."
          style={{ flex: 1, minWidth: 220, padding: "11px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", fontFamily: "inherit" }} />
        <select value={filterIndustry} onChange={e => setFilterIndustry(e.target.value)}
          style={{ padding: "11px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "#1a1a2e", color: "#fff", fontSize: 13, outline: "none", fontFamily: "inherit" }}>
          {industries.map(i => <option key={i}>{i}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
          style={{ padding: "11px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "#1a1a2e", color: "#fff", fontSize: 13, outline: "none", fontFamily: "inherit" }}>
          {statuses.map(s => <option key={s}>{s}</option>)}
        </select>
        <select value={sort} onChange={e => setSort(e.target.value)}
          style={{ padding: "11px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "#1a1a2e", color: "#fff", fontSize: 13, outline: "none", fontFamily: "inherit" }}>
          <option value="trending">Trending</option>
          <option value="score">AI Score</option>
          <option value="views">Most Viewed</option>
          <option value="newest">Newest</option>
        </select>
      </div>

      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.35)", marginBottom: 16 }}>{filtered.length} ideas found</div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 16 }}>
        {filtered.map(idea => <IdeaCard key={idea.id} idea={idea} onClick={onIdeaClick} />)}
      </div>
    </div>
  );
}

              style={{ padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", fontFamily: "inherit" }} />
            <input type="password" value={form.password} onChange={e => set("password", e.target.value)} placeholder="Password"
              style={{ padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", fontFamily: "inherit" }} />

            {mode === "signup" && (
              <>
                <select value={form.role} onChange={e => set("role", e.target.value)}
                  style={{ padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "#1a1a2e", color: "#fff", fontSize: 14, outline: "none", fontFamily: "inherit" }}>
                  {["Founder","Developer","Designer","Marketer","Investor"].map(r => <option key={r}>{r}</option>)}
                </select>
                <input value={form.skills} onChange={e => set("skills", e.target.value)} placeholder="Skills (comma-separated)"
                  style={{ padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", fontFamily: "inherit" }} />
                <input value={form.country} onChange={e => set("country", e.target.value)} placeholder="Country"
                  style={{ padding: "12px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "#fff", fontSize: 14, outline: "none", fontFamily: "inherit" }} />
              </>
            )}

            <button onClick={handleSubmit} style={{ padding: "14px", borderRadius: 12, border: "none",
              background: "linear-gradient(135deg, #c084fc, #818cf8)", color: "#fff", cursor: "pointer", fontWeight: 800, fontSize: 15, marginTop: 4 }}>
              {mode === "login" ? "Sign In" : "Create Account"}
            </button>

            {mode === "login" && (
              <button onClick={handleSubmit} style={{ padding: "12px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.04)", color: "rgba(255,255,255,0.6)", cursor: "pointer", fontSize: 14 }}>
                Continue as Demo User
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
export default function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [ideas, setIdeas] = useState(MOCK_IDEAS);
  const [selectedIdea, setSelectedIdea] = useState(null);
  const [notification, setNotification] = useState(null);

  const notify = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 3000);
  };

  const handleIdeaClick = (idea) => {
    setSelectedIdea(idea);
    setPage("idea-detail");
  };

  const handleVote = (ideaId, voteType) => {
    setIdeas(prev => prev.map(i => i.id === ideaId ? { ...i, votes: { ...i.votes, [voteType]: i.votes[voteType] + 1 } } : i));
    notify("Vote recorded! +5 reputation earned.");
  };

  const handleComment = (ideaId, text) => {
    const newComment = { id: Date.now(), userId: user.id, user: user.name, avatar: user.avatar, text, likes: 0, time: "Just now", replies: [] };
    setIdeas(prev => prev.map(i => i.id === ideaId ? { ...i, comments: [...i.comments, newComment] } : i));
    if (selectedIdea?.id === ideaId) setSelectedIdea(prev => ({ ...prev, comments: [...prev.comments, newComment] }));
    notify("Comment posted! +10 reputation earned.");
  };

  const handleSubmitIdea = (formData) => {
    const newIdea = {
      id: Date.now(), ...formData, authorId: user.id, author: user.name, authorRole: user.role,
      votes: { high: 0, improve: 0, notViable: 0 }, collaborators: 0, views: 1, comments: [],
      status: "New", seeking: formData.seeking || [], createdAt: new Date().toISOString().slice(0, 10),
      aiReport: {
        marketDemand: Math.floor(Math.random() * 30 + 60), competition: Math.floor(Math.random() * 40 + 40),
        monetizationPotential: Math.floor(Math.random() * 30 + 60), scalability: Math.floor(Math.random() * 30 + 60),
        riskLevel: Math.floor(Math.random() * 40 + 20), successProbability: Math.floor(Math.random() * 30 + 55),
        investorReadiness: Math.floor(Math.random() * 40 + 40), competitors: [], trends: [], roadmap: [], techStack: [],
      }
    };
    setIdeas(prev => [newIdea, ...prev]);
    notify("🚀 Idea submitted! AI analysis complete.");
    setPage("explore");
  };

  const navItems = [
    { id: "dashboard", label: "Dashboard", icon: "⊞" },
    { id: "explore", label: "Explore", icon: "✦" },
    { id: "submit", label: "Submit Idea", icon: "+" },
    { id: "profile", label: "Profile", icon: "◎" },
  ];

  if (!user) return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0d1a; font-family: 'DM Sans', sans-serif; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
        @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(192,132,252,0.3); border-radius: 2px; }
      `}</style>
      <div style={{ background: "radial-gradient(ellipse at top, #1a0a2e 0%, #0d0d1a 60%)", minHeight: "100vh" }}>
        <AuthScreen onLogin={setUser} />
      </div>
    </>
  );

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0d1a; font-family: 'DM Sans', sans-serif; color: #fff; overflow-x: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }
        @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
        select option { background: #1a1a2e; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(192,132,252,0.3); border-radius: 2px; }
      `}</style>

      <div style={{ background: "radial-gradient(ellipse at top, #1a0a2e 0%, #0d0d1a 60%)", minHeight: "100vh" }}>
        {/* Top Nav */}
        <nav style={{ position: "sticky", top: 0, zIndex: 100, borderBottom: "1px solid rgba(255,255,255,0.07)", background: "rgba(13,13,26,0.85)", backdropFilter: "blur(20px)" }}>
          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 20px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
            <div style={{ fontSize: 22, fontWeight: 900, fontFamily: "'Syne', sans-serif", background: "linear-gradient(135deg, #c084fc, #60a5fa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: -1 }}>
              LetsDoIt
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {navItems.map(n => (
                <button key={n.id} onClick={() => { setPage(n.id); setSelectedIdea(null); }}
                  style={{ padding: "8px 16px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "all 0.2s",
                    background: page === n.id ? "rgba(192,132,252,0.15)" : "transparent",
                    color: page === n.id ? "#c084fc" : "rgba(255,255,255,0.45)" }}>
                  <span style={{ marginRight: 6 }}>{n.icon}</span>{n.label}
                </button>
              ))}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>
                <span style={{ color: "#ffd600", fontWeight: 700 }}>⭐ {user.reputation.toLocaleString()}</span>
              </div>
              <Avatar initials={user.avatar} size={34} color={roleColors[user.role]} />
            </div>
          </div>
        </nav>

        {/* Main Content */}
        <main style={{ maxWidth: 1100, margin: "0 auto", padding: "32px 20px" }}>
          {notification && (
            <div style={{ position: "fixed", top: 72, right: 20, zIndex: 200, padding: "12px 20px", borderRadius: 12,
              background: "rgba(0,255,135,0.12)", border: "1px solid rgba(0,255,135,0.3)", color: "#00ff87",
              fontSize: 14, fontWeight: 600, animation: "slideIn 0.3s ease", backdropFilter: "blur(20px)" }}>
              {notification.msg}
            </div>
          )}

          {page === "dashboard" && <Dashboard user={user} ideas={ideas} onIdeaClick={handleIdeaClick} onSubmit={() => setPage("submit")} />}
          {page === "explore" && <Explore ideas={ideas} onIdeaClick={handleIdeaClick} />}
          {page === "submit" && <SubmitIdea onSubmit={handleSubmitIdea} onCancel={() => setPage("explore")} />}
          {page === "profile" && <Profile user={user} />}
          {page === "idea-detail" && selectedIdea && (
            <IdeaDetail idea={selectedIdea} currentUser={user} onBack={() => { setPage("explore"); setSelectedIdea(null); }}
              onVote={handleVote} onComment={handleComment} />
          )}
        </main>

        {/* Footer */}
        <footer style={{ borderTop: "1px solid rgba(255,255,255,0.05)", padding: "20px", textAlign: "center", marginTop: 48 }}>
          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.2)" }}>LetsDoIt · AI-Powered Startup Collaboration Platform · Where ideas become companies</span>
        </footer>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
