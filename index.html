async function callAI(prompt,sys){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","x-api-key":""},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,
        system:sys||"You are an elite startup advisor and venture analyst. Be sharp, direct, and actionable. Use plain text only with no markdown symbols.",
        messages:[{role:"user",content:prompt}]})
    });
    if(!r.ok)throw new Error("API error "+r.status);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content?.[0]?.text||"No response received.";
  }catch(e){
    return "AI service unavailable right now. Please try again.";
  }
}

function ScoreArc({score,size,label}){
  size=size||60;
  const r=size/2-6,c=2*Math.PI*r,col=scoreColor(score);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="4"
          strokeDasharray={c} strokeDashoffset={c-(score/100)*c} strokeLinecap="round"
          style={{filter:"drop-shadow(0 0 6px "+col+"88)",transition:"stroke-dashoffset 1.2s ease"}}/>
        <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
          style={{fill:col,fontSize:size*0.22,fontWeight:700,fontFamily:"var(--fd)",
            transform:"rotate(90deg)",transformOrigin:(size/2)+"px "+(size/2)+"px"}}>{score}</text>
      </svg>
      {label&&<span style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1.5,textAlign:"center"}}>{label}</span>}
    </div>
  );
}

  const [loading,setLoading]=useState({});

  var fetchAI=async function(type){
    if(loading[type]||aiState[type])return;
    setLoading(function(l){return Object.assign({},l,{[type]:true});});
    var prompts={

      roadmap:"90-day execution roadmap for: \""+idea.title+"\"\nProblem: "+idea.problem+"\nSolution: "+idea.solution+"\n\nOrganize by: Week 1-2 Foundation, Week 3-6 Build, Week 7-10 Launch, Week 11-12 Scale. List specific concrete tasks. Under 300 words. Plain text only.",

      trends:"Current market trends for "+idea.industry+" relevant to: \""+idea.title+"\"\n\n5 specific trends with data points. Explain opportunity or risk for this startup. Under 280 words. Plain text only.",
    };
    var t=await callAI(prompts[type]);
    setAiState(function(s){return Object.assign({},s,{[type]:t});});
    setLoading(function(l){return Object.assign({},l,{[type]:false});});
  };

  var handleVote=function(type){if(!voted){setVoted(type);onVote(idea.id,type);}};
  var handleComment=function(){if(comment.trim()){onComment(idea.id,comment);setComment("");}};

          {idea.comments.map(function(c){return(

                      <div style={{marginTop:10,display:"flex",gap:8,alignItems:"flex-start"}}>
                        <Av initials={user.avatar} size={26} role={user.role}/>

              {(c.replies||[]).map(function(r){return(

                  <div style={{display:"flex",gap:8}}>
                    <Av initials={r.avatar} size={26} role="Developer"/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4,marginBottom:5}}>

            {SEED_USERS.filter(function(u){return u.id!==idea.authorId;}).slice(0,4).map(function(u,i){return(
              <div key={u.id} style={{display:"flex",gap:12,alignItems:"center",padding:"13px 0",borderBottom:i<3?"1px solid rgba(255,255,255,0.04)":"none"}}>

function SubmitIdea({onSubmit,onCancel}){
  const [step,setStep]=useState(1);
  const [submitting,setSubmitting]=useState(false);
  const [form,setForm]=useState({title:"",problem:"",solution:"",targetUsers:"",marketSize:"",monetization:"",industry:"FinTech",tags:"",seeking:[]});
  const [errors,setErrors]=useState({});
  const [preAnalysis,setPreAnalysis]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);

  var set=function(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});setErrors(function(e){return Object.assign({},e,{[k]:""});});};

  var validateStep1=function(){
    var e={};
    if(!form.title.trim())e.title="Title is required";
    else if(form.title.trim().length<10)e.title="Title needs at least 10 characters";
    if(!form.problem.trim())e.problem="Problem statement is required";
    else if(form.problem.trim().length<30)e.problem="Please describe the problem in more detail (30+ chars)";
    if(!form.solution.trim())e.solution="Solution is required";
    else if(form.solution.trim().length<30)e.solution="Please describe your solution in more detail (30+ chars)";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  var analyze=async function(){
    if(!form.title||!form.problem||analyzing)return;
    setAnalyzing(true);
    var t=await callAI("Quick startup validation for: \""+form.title+"\"\nProblem: "+form.problem+"\nSolution: "+form.solution+"\n\nGive: 1 biggest strength, 1 biggest risk, 3 critical questions to answer before building. Be direct. Under 200 words. Plain text only.");
    setPreAnalysis(t);
    setAnalyzing(false);
  };

  var handleSubmit=function(){
    if(!validateStep1()){setStep(1);return;}
    setSubmitting(true);
    setTimeout(function(){
      onSubmit({
        title:form.title.trim(),problem:form.problem.trim(),solution:form.solution.trim(),
        targetUsers:form.targetUsers.trim(),marketSize:form.marketSize.trim(),
        monetization:form.monetization.trim(),industry:form.industry,
        tags:form.tags?form.tags.split(",").map(function(t){return t.trim();}).filter(Boolean):[],
        seeking:form.seeking,
        aiScore:Math.floor(Math.random()*18+70),validationScore:Math.floor(Math.random()*15+65),
      });
    },500);
  };

  var iS={width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.03)",color:"var(--text)",fontSize:13.5,boxSizing:"border-box",transition:"border-color .2s",fontFamily:"var(--fb)"};
  var eS=Object.assign({},iS,{border:"1px solid rgba(255,79,123,0.5)"});
  var lS={fontSize:10,fontWeight:700,color:"rgba(167,139,250,.75)",letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:7};

  return(
    <div className="page-enter" style={{width:"100%",maxWidth:700,margin:"0 auto"}}>
      <button onClick={onCancel} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13,marginBottom:24,padding:"6px 0",transition:"color .2s"}} onMouseEnter={function(e){e.currentTarget.style.color="var(--text)";}} onMouseLeave={function(e){e.currentTarget.style.color="var(--text3)";}}>← Cancel</button>
      <div style={{background:"var(--bg3)",borderRadius:"var(--r3)",padding:"clamp(20px,4vw,36px)",border:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#a78bfa,#4f9fff,#4fffb0)"}}/>
        <h2 style={{fontSize:"clamp(20px,4vw,24px)",fontWeight:700,color:"var(--text)",marginBottom:5,fontFamily:"var(--fd)",letterSpacing:-0.4}}>Launch Your Idea</h2>
        <p style={{fontSize:13,color:"var(--text3)",marginBottom:24}}>AI will automatically score, analyze and match collaborators for your idea</p>
        <div style={{display:"flex",gap:6,marginBottom:28}}>
          {[1,2,3].map(function(s){return(
            <div key={s} onClick={function(){if(s<step)setStep(s);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:s<step?"pointer":"default"}}>
              <div style={{width:"100%",height:4,borderRadius:2,transition:"all .4s",background:step>=s?"linear-gradient(90deg,#a78bfa,#818cf8)":"rgba(255,255,255,0.07)"}}/>
              <span style={{fontSize:10,color:step>=s?"#a78bfa":"var(--text3)",fontWeight:600}}>{["Details","Business","Review"][s-1]}</span>
            </div>
          );})}
        </div>

        {step===1&&(
          <div style={{display:"grid",gap:16,animation:"fadeUp .3s ease"}}>
            <div>
              <label style={lS}>Idea Title (required, min 10 chars)</label>
              <input value={form.title} onChange={function(e){set("title",e.target.value);}} placeholder="e.g. AI-powered legal contract analyzer for SMBs" style={errors.title?eS:iS} onKeyDown={function(e){if(e.key==="Enter")document.activeElement.blur();}}/>
              {errors.title&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:4,paddingLeft:2}}>{errors.title}</div>}
              <div style={{fontSize:10,color:"var(--text3)",marginTop:3}}>{form.title.length+"/100"}</div>
            </div>
            <div>
              <label style={lS}>Problem Statement (required, min 30 chars)</label>
              <textarea value={form.problem} onChange={function(e){set("problem",e.target.value);}} placeholder="What painful problem are you solving? Be specific about who has this problem and why existing solutions fail." rows={4} style={errors.problem?Object.assign({},eS,{resize:"vertical",fontFamily:"var(--fb)"}):Object.assign({},iS,{resize:"vertical",fontFamily:"var(--fb)"})}/>

function Explore({ideas,onIdeaClick}){
  const [q,setQ]=useState("");const [ind,setInd]=useState("All");const [status,setStatus]=useState("All");const [sort,setSort]=useState("trending");
  var industries=["All",...new Set(ideas.map(function(i){return i.industry;}))];
  var filtered=ideas.filter(function(i){
    if(!q)return true;var ql=q.toLowerCase();
    return i.title.toLowerCase().includes(ql)||i.problem.toLowerCase().includes(ql)||(i.tags||[]).some(function(t){return t.toLowerCase().includes(ql);})||i.industry.toLowerCase().includes(ql)||(i.author||"").toLowerCase().includes(ql)||(i.solution||"").toLowerCase().includes(ql);
  }).filter(function(i){return ind==="All"||i.industry===ind;}).filter(function(i){return status==="All"||i.status===status;}).sort(function(a,b){
    if(sort==="score")return b.aiScore-a.aiScore;if(sort==="views")return b.views-a.views;if(sort==="newest")return new Date(b.createdAt)-new Date(a.createdAt);return b.votes.high-a.votes.high;
  });
  var sS={padding:"10px 12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text2)",fontSize:12,cursor:"pointer"};
  return(
    <div className="page-enter">
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:700,color:"var(--text)",fontFamily:"var(--fd)",letterSpacing:-0.5,marginBottom:4}}>Explore Ideas</h2>
        <p style={{fontSize:13,color:"var(--text3)"}}>Discover, validate, and collaborate on the next big thing</p>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
        <input value={q} onChange={function(e){setQ(e.target.value);}} placeholder="Search ideas, tags, problems..." style={{flex:1,minWidth:200,padding:"10px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text)",fontSize:13}}/>
        <select value={ind} onChange={function(e){setInd(e.target.value);}} style={sS}>{industries.map(function(i){return <option key={i}>{i}</option>;})}</select>
        <select value={status} onChange={function(e){setStatus(e.target.value);}} style={sS}>{["All","Trending","Hot","New"].map(function(s){return <option key={s}>{s}</option>;})}</select>
        <select value={sort} onChange={function(e){setSort(e.target.value);}} style={sS}>
          <option value="trending">Trending</option><option value="score">AI Score</option><option value="views">Most Viewed</option><option value="newest">Newest</option>
        </select>
      </div>
      <div style={{fontSize:11,color:"var(--text3)",marginBottom:14,letterSpacing:0.5}}>{filtered.length+" IDEA"+(filtered.length!==1?"S":"")+" FOUND"}</div>
      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text3)"}}>
          <div style={{fontSize:32,marginBottom:12}}>🔍</div>
          <div style={{fontSize:14,marginBottom:6}}>No ideas match your search</div>
          <div style={{fontSize:12}}>Try different keywords or clear the filters</div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,290px),1fr))",gap:14}}>
          {filtered.map(function(idea,i){return <IdeaCard key={idea.id} idea={idea} onClick={onIdeaClick} index={i}/>;})}</div>
      )}
    </div>
  );
}

  const [form,setForm]=useState({name:"",email:"",password:"",role:"Founder",skills:"",country:"",bio:""});
  const [errors,setErrors]=useState({});
  const [submitting,setSubmitting]=useState(false);
  var set=function(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});setErrors(function(e){return Object.assign({},e,{[k]:""}); });};
  var validate=function(){
    var e={};
    if(mode==="signup"){if(!form.name.trim())e.name="Full name is required";else if(form.name.trim().length<2)e.name="Name too short";}
    if(!form.email.trim())e.email="Email is required";else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))e.email="Please enter a valid email";
    if(!form.password)e.password="Password is required";else if(mode==="signup"&&form.password.length<6)e.password="Password must be at least 6 characters";
    setErrors(e);return Object.keys(e).length===0;
  };
  var handleSubmit=function(){
    if(!validate())return;setSubmitting(true);
    setTimeout(function(){
      if(mode==="login"){onLogin(SEED_USERS[0]);}
      else{onLogin({id:99,name:form.name.trim(),role:form.role,avatar:form.name.trim().split(" ").map(function(n){return n[0]||"";}).join("").slice(0,2).toUpperCase()||"U",country:form.country||"Global",skills:form.skills?form.skills.split(",").map(function(s){return s.trim();}).filter(Boolean):[],bio:form.bio||"New startup builder on LetsDoIt.",reputation:100,ideas:0,collabs:0});}
    },700);
  };
  var iS={width:"100%",padding:"13px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.04)",color:"var(--text)",fontSize:13.5,boxSizing:"border-box",transition:"border-color .2s"};
  var eS=Object.assign({},iS,{border:"1px solid rgba(255,79,123,0.5)"});
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,position:"relative",background:"var(--bg)"}}>
      <div style={{position:"fixed",top:"15%",left:"5%",width:400,height:400,borderRadius:"50%",background:"rgba(167,139,250,.04)",filter:"blur(100px)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:"15%",right:"5%",width:350,height:350,borderRadius:"50%",background:"rgba(79,255,176,.03)",filter:"blur(80px)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:460,animation:"fadeUp .5s ease",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:"clamp(36px,8vw,50px)",fontWeight:700,fontFamily:"var(--fd)",letterSpacing:-2,background:"linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#4fffb0 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>LetsDoIt</div>
          <p style={{fontSize:13,color:"var(--text3)",fontStyle:"italic",fontFamily:"var(--fs)"}}>Where startup ideas become companies</p>
        </div>
        <div style={{background:"var(--bg3)",borderRadius:"var(--r3)",padding:"clamp(22px,4vw,32px)",border:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"1.5px",background:"linear-gradient(90deg,transparent,rgba(167,139,250,.5),transparent)"}}/>
          <div style={{display:"flex",background:"rgba(255,255,255,0.03)",borderRadius:12,padding:4,marginBottom:24}}>
            {["login","signup"].map(function(m){return <button key={m} onClick={function(){setMode(m);setErrors({});}} style={{flex:1,padding:"10px",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .2s",background:mode===m?"rgba(167,139,250,.15)":"transparent",color:mode===m?"#a78bfa":"var(--text3)"}}>{m==="login"?"Sign In":"Sign Up"}</button>;})}
          </div>
          <div style={{display:"grid",gap:10}}>
            {mode==="signup"&&<div>
              <input value={form.name} onChange={function(e){set("name",e.target.value);}} placeholder="Full Name" style={errors.name?eS:iS}/>
              {errors.name&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.name}</div>}
            </div>}
            <div>
              <input value={form.email} onChange={function(e){set("email",e.target.value);}} placeholder="Email address" style={errors.email?eS:iS}/>
              {errors.email&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.email}</div>}
            </div>
            <div>
              <input type="password" value={form.password} onChange={function(e){set("password",e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleSubmit();}} placeholder="Password" style={errors.password?eS:iS}/>
              {errors.password&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.password}</div>}
            </div>
            {mode==="signup"&&<>
              <select value={form.role} onChange={function(e){set("role",e.target.value);}} style={Object.assign({},iS,{background:"var(--bg2)",cursor:"pointer"})}>
                {["Founder","Developer","Designer","Marketer","Investor"].map(function(r){return <option key={r}>{r}</option>;})}
              </select>
              <input value={form.skills} onChange={function(e){set("skills",e.target.value);}} placeholder="Skills (e.g. React, Product, Growth)" style={iS}/>
              <input value={form.country} onChange={function(e){set("country",e.target.value);}} placeholder="Country" style={iS}/>
              <textarea value={form.bio} onChange={function(e){set("bio",e.target.value);}} placeholder="Short bio (optional)" rows={2} style={Object.assign({},iS,{resize:"none"})}/>
            </>}
            <button onClick={handleSubmit} disabled={submitting}
              style={{padding:"14px",borderRadius:12,border:"none",marginTop:4,cursor:submitting?"not-allowed":"pointer",fontWeight:700,fontSize:15,transition:"all .2s",
                background:submitting?"rgba(167,139,250,.4)":"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff",boxShadow:submitting?"none":"0 4px 20px rgba(167,139,250,.25)"}}>
              {submitting?"Signing in...":(mode==="login"?"Sign In":"Create Account")}
            </button>
            {mode==="login"&&<button onClick={function(){setSubmitting(true);setTimeout(function(){onLogin(SEED_USERS[0]);},400);}}
              style={{padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.03)",color:"var(--text2)",cursor:"pointer",fontSize:13}}>
              Continue as Demo User
            </button>}
          </div>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"var(--text3)",marginTop:16}}>Join 12,000+ founders, builders and investors · Free forever</p>
      </div>
    </div>
  );
}

function Toast({msg,type,onClose}){
  type=type||"success";
  useEffect(function(){var t=setTimeout(onClose,3500);return function(){clearTimeout(t);};},[]);
  var cfg={success:{bg:"rgba(79,255,176,.1)",border:"rgba(79,255,176,.25)",c:"var(--accent3)"},error:{bg:"rgba(255,79,123,.1)",border:"rgba(255,79,123,.25)",c:"var(--accent2)"},info:{bg:"rgba(167,139,250,.1)",border:"rgba(167,139,250,.25)",c:"#a78bfa"}};
  var s=cfg[type]||cfg.success;
  return <div style={{padding:"11px 16px",borderRadius:12,background:s.bg,border:"1px solid "+s.border,color:s.c,fontSize:13,fontWeight:600,backdropFilter:"blur(20px)",animation:"slideDown .3s ease",display:"flex",alignItems:"center",gap:8,maxWidth:320,wordBreak:"break-word"}}>
    {msg}
    <button onClick={onClose} style={{background:"none",border:"none",color:s.c,cursor:"pointer",fontSize:14,marginLeft:4,opacity:0.6}}>x</button>
  </div>;
}

function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [ideas,setIdeas]=useState(SEED_IDEAS);
  const [selected,setSelected]=useState(null);
  const [toasts,setToasts]=useState([]);

  var notify=function(msg,type){
    type=type||"success";var id=Date.now();
    setToasts(function(t){return [...t,{id,msg,type}];});
    setTimeout(function(){setToasts(function(t){return t.filter(function(x){return x.id!==id;});});},4500);
  };

  var navigate=function(pg,idea){
    setPage(pg);
    if(idea)setSelected(idea);
    else if(pg!=="detail")setSelected(null);
    window.scrollTo({top:0,behavior:"smooth"});
  };

  useEffect(function(){
    if(selected){var fresh=ideas.find(function(i){return i.id===selected.id;});if(fresh)setSelected(fresh);}
  },[ideas]);

  var handleVote=function(ideaId,type){
    setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{votes:Object.assign({},i.votes,{[type]:i.votes[type]+1})}):i;});});
    notify("Vote recorded! +5 reputation earned","success");
  };

  var handleComment=function(ideaId,text,parentId){
    var nc={id:Date.now(),userId:user.id,user:user.name,avatar:user.avatar,text:text.trim(),likes:0,liked:false,time:"Just now",replies:[]};
    if(parentId){
      setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{comments:i.comments.map(function(c){return c.id===parentId?Object.assign({},c,{replies:[...c.replies,nc]}):c;})}):i;});});
    }else{
      setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{comments:[...i.comments,nc]}):i;});});
    }
    notify("Comment posted! +10 reputation","success");
  };

  var handleLike=function(ideaId,commentId,replyId){
    setIdeas(function(p){return p.map(function(i){
      if(i.id!==ideaId)return i;
      return Object.assign({},i,{comments:i.comments.map(function(c){
        if(c.id!==commentId)return c;
        if(replyId){return Object.assign({},c,{replies:c.replies.map(function(r){return r.id===replyId?Object.assign({},r,{likes:r.liked?r.likes-1:r.likes+1,liked:!r.liked}):r;})});}
        return Object.assign({},c,{likes:c.liked?c.likes-1:c.likes+1,liked:!c.liked});
      })});
    });});
  };

  var handleCollab=function(ideaId,role,message){
    setIdeas(function(p){return p.map(function(i){return i.id===ideaId?Object.assign({},i,{collaborators:(i.collaborators||0)+1}):i;});});
    notify("Collaboration request sent as "+role+"! +30 reputation when approved.","success");
  };

  var handleSubmitIdea=function(data){
    var ni=Object.assign({},data,{
      id:Date.now(),authorId:user.id,author:user.name,authorRole:user.role,
      votes:{high:0,improve:0,notViable:0},collaborators:0,views:1,comments:[],status:"New",
      createdAt:new Date().toISOString().slice(0,10),
      report:{marketDemand:data.aiScore||Math.floor(Math.random()*20+65),competition:Math.floor(Math.random()*30+45),monetization:Math.floor(Math.random()*20+65),scalability:Math.floor(Math.random()*20+65),risk:Math.floor(Math.random()*30+20),success:Math.floor(Math.random()*20+55),investor:Math.floor(Math.random()*30+45),competitors:[],trends:[],roadmap:[],stack:[]}
    });
    setIdeas(function(p){return [ni,...p];});
    setUser(function(u){return Object.assign({},u,{ideas:(u.ideas||0)+1,reputation:(u.reputation||0)+50});});
    notify("Idea submitted! AI analysis ready. +50 reputation","success");
    navigate("explore");
  };

  var navItems=[{id:"dashboard",label:"Dashboard",icon:"⊞"},{id:"explore",label:"Explore",icon:"✦"},{id:"submit",label:"Submit",icon:"+"},{id:"profile",label:"Profile",icon:"◎"}];

  if(!user)return <Auth onLogin={function(u){setUser(u);setPage("dashboard");}}/>;

  return <>
    <div style={{position:"fixed",top:"5%",left:"5%",width:500,height:500,borderRadius:"50%",background:"rgba(167,139,250,.018)",filter:"blur(130px)",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"fixed",bottom:"10%",right:"5%",width:400,height:400,borderRadius:"50%",background:"rgba(79,255,176,.012)",filter:"blur(110px)",pointerEvents:"none",zIndex:0}}/>
    <nav style={{position:"sticky",top:0,zIndex:100,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(8,8,16,0.9)",backdropFilter:"blur(24px)"}}>
      <div style={{maxWidth:1400,margin:"0 auto",padding:"0 clamp(12px,3vw,24px)",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <button onClick={function(){navigate("dashboard");}} style={{background:"linear-gradient(135deg,#a78bfa,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",border:"none",cursor:"pointer",fontSize:19,fontWeight:700,fontFamily:"var(--fd)",letterSpacing:-0.8}}>LetsDoIt</button>
        <div style={{display:"flex",gap:2}}>
          {navItems.map(function(n){return(
            <button key={n.id} onClick={function(){navigate(n.id);}}
              style={{padding:"7px 9px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all .2s",
                background:page===n.id&&page!=="detail"?"rgba(167,139,250,.12)":"transparent",
                color:page===n.id&&page!=="detail"?"#a78bfa":"rgba(240,240,248,.4)"}}>
              <span style={{marginRight:3}}>{n.icon}</span><span className="nav-text">{n.label}</span>
            </button>
          );})}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="hide-mobile" style={{fontSize:12,color:"#fbbf24",fontWeight:700}}>{"⭐ "+user.reputation.toLocaleString()}</span>
          <button onClick={function(){navigate("profile");}} style={{background:"none",border:"none",cursor:"pointer",borderRadius:"50%",padding:0}}>
            <Av initials={user.avatar} size={30} role={user.role}/>
          </button>
        </div>
      </div>
    </nav>
    <div style={{position:"fixed",top:66,right:16,zIndex:999,display:"flex",flexDirection:"column",gap:8}}>
      {toasts.map(function(t){return <Toast key={t.id} msg={t.msg} type={t.type} onClose={function(){setToasts(function(ts){return ts.filter(function(x){return x.id!==t.id;});});}}/>;})}
    </div>
    <main style={{width:"100%",maxWidth:1400,margin:"0 auto",padding:"24px clamp(12px,3vw,24px) 60px",position:"relative",zIndex:1}}>
      {page==="dashboard"&&<Dashboard user={user} ideas={ideas} onIdeaClick={function(idea){navigate("detail",idea);}} onSubmit={function(){navigate("submit");}}/>}
      {page==="explore"&&<Explore ideas={ideas} onIdeaClick={function(idea){navigate("detail",idea);}}/>}
      {page==="submit"&&<SubmitIdea onSubmit={handleSubmitIdea} onCancel={function(){navigate("explore");}}/>}
      {page==="profile"&&<Profile user={user}/>}
      {page==="detail"&&selected&&<IdeaDetail idea={selected} user={user} onBack={function(){navigate("explore");}} onVote={handleVote} onComment={handleComment} onLike={handleLike} onCollab={handleCollab}/>}
    </main>
    <footer style={{borderTop:"1px solid rgba(255,255,255,0.04)",padding:"16px 20px",textAlign:"center",position:"relative",zIndex:1}}>
      <span style={{fontSize:10,color:"var(--text3)",letterSpacing:0.8}}>LETSDOIT · AI-POWERED STARTUP COLLABORATION · WHERE IDEAS BECOME COMPANIES</span>
    </footer>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
