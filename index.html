<script>
// Error capture
window.onerror=function(msg,src,line,col,err){
  var el=document.getElementById("errd");
  if(el){el.style.display="block";el.innerHTML+="<div>ERR L"+line+": "+msg+"</div>";}
};
window.addEventListener("unhandledrejection",function(e){
  var el=document.getElementById("errd");
  if(el){el.style.display="block";el.innerHTML+="<div>PROMISE: "+(e.reason&&e.reason.message||String(e.reason))+"</div>";}
});
// Hide loading when React mounts
window.__hideLd=function(){
  var el=document.getElementById("ld");
  if(el)el.style.display="none";
};
// Fallback timeout
setTimeout(function(){
  var el=document.getElementById("ld");
  if(el&&el.style.display!=="none"){
    el.innerHTML='<div style="text-align:center;padding:20px;color:#f0f0f8;font-family:sans-serif;"><div style="font-size:28px;margin-bottom:12px;">LetsDoIt</div><div style="color:#ff4f7b;margin-bottom:8px;">Something went wrong.</div><button onclick="localStorage.clear();location.reload();" style="padding:10px 24px;border-radius:10px;border:none;background:#a78bfa;color:#fff;font-size:14px;cursor:pointer;font-weight:700;">Clear Cache &amp; Reload</button></div>';
  }
},12000);
</script>

// AI call function
async function callAI(prompt,sys){
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,
        system:sys||"You are an elite startup advisor. Be sharp, direct, and actionable. Plain text only, no markdown.",
        messages:[{role:"user",content:prompt}]})
    });
    if(!r.ok)throw new Error("HTTP "+r.status);
    var d=await r.json();
    if(d.error)throw new Error(d.error.message);
    var content=d.content;
    if(content&&content[0]&&content[0].text)return content[0].text;
    return "No response received.";
  }catch(e){
    return getMockAI(prompt);
  }
}

// Compact mock responses
function getMockAI(p){
  p=(p||"").toLowerCase();
  if(p.indexOf("trend")>=0||p.indexOf("sector")>=0){
    return "Top 5 Startup Sectors 2025:\n\n1. AI Infrastructure (Very High) — Every enterprise needs LLM tooling, monitoring and cost control.\n\n2. Climate Tech (Very High) — Government mandates and cheap renewables driving massive capital.\n\n3. Healthcare AI (High) — FDA fast-tracking diagnostics, clinical workflows severely underserved.\n\n4. B2B Fintech (High) — Embedded finance and invoice financing growing 40% annually.\n\n5. Robotics (High) — Labor shortages plus falling hardware costs drive physical automation.";
  }
  if(p.indexOf("roadmap")>=0||p.indexOf("90-day")>=0){
    return "90-Day Roadmap:\n\nWeek 1-2 Foundation: Define ICP precisely. Interview 20 customers. Set up infrastructure and CI/CD.\n\nWeek 3-6 Build: Ship narrowest MVP. Get 3 design partners using it daily. Iterate weekly.\n\nWeek 7-10 Launch: Launch on Product Hunt. Target 50 signups and 10 active users.\n\nWeek 11-12 Scale: Convert design partners to paying customers. Build one repeatable acquisition channel.";
  }
  if(p.indexOf("suggestion")>=0||p.indexOf("improvement")>=0){
    return "5 Key Improvements:\n\n1. Narrow your ICP ruthlessly — one job title, one industry, one company size first.\n\n2. Price around value delivered, not features. Charge based on ROI and time saved.\n\n3. Free tier with hard paywall at the moment users realize the product works.\n\n4. Build one public case study with quantified results — your best sales asset.\n\n5. Build community around the problem, not your product. Become the trusted resource.";
  }
  if(p.indexOf("validation")>=0||p.indexOf("critical")>=0){
    return "Validation Analysis:\n\nStrength: Solves a real recurring pain validated by existing workarounds people already use daily.\n\nRisk: Assumptions about user behavior are untested. Most will be wrong until disproven.\n\nCritical Questions:\n1. Will people pay today? Get a letter of intent before writing code.\n2. Why has this not been built well before? The answer reveals the real difficulty.\n3. What is the one metric that proves it is working in 18 months?";
  }
  if(p.indexOf("analysis")>=0||p.indexOf("strength")>=0||p.indexOf("risk")>=0){
    return "Venture Analysis:\n\nStrengths:\n1. Solves genuine daily pain with clear urgency\n2. AI-native approach gives 10x advantage over legacy incumbents\n3. B2B SaaS model with strong recurring revenue potential\n\nRisks:\n1. Enterprise sales cycles are long — budget 6-12 months before meaningful revenue\n2. AI accuracy must be near-perfect or trust erodes fast\n3. Large platforms could bundle a version into existing products\n\nContrarian Insight: Your real moat is proprietary training data from customer interactions, not the model itself.";
  }
  if(p.indexOf("mentor")>=0||p.indexOf("advice")>=0){
    return "Mentor Advice:\n\nGrowth Opportunities:\n1. Your domain expertise is an unfair advantage — write and teach publicly about the problem.\n2. Find one experienced operator who will be brutally honest with you.\n3. Master one distribution channel completely before diversifying.\n\nSkill Gap: The transition from builder to seller is the hardest leap. Practice handling objections daily.\n\nIdea to Explore: Build a vertical AI tool for the industry you know deeply — domain expertise plus AI is genuinely defensible.";
  }
  return "AI analysis running in offline mode. All core features work fully without AI connectivity.";
}

function ScoreArc({score,size,label}){
  size=size||60;
  const r=size/2-6,c=2*Math.PI*r,col=scoreColor(score);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="4"
          strokeDasharray={c} strokeDashoffset={c-(score/100)*c} strokeLinecap="round"
          style={{filter:"drop-shadow(0 0 6px "+col+"88)",transition:"stroke-dashoffset 1.2s ease"}}/>
        <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"

}

      style={{background:hov?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.025)",border:"1px solid "+(hov?"rgba(255,255,255,0.11)":"rgba(255,255,255,0.06)"),
        borderRadius:"var(--r2)",padding:"20px 20px 16px",cursor:"pointer",transition:"all .25s ease",transform:hov?"translateY(-3px)":"none",
        position:"relative",overflow:"hidden",animation:"fadeUp .4s ease both",animationDelay:(index*0.055)+"s"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"1.5px",background:"linear-gradient(90deg,transparent,"+scoreColor(idea.aiScore)+"66,transparent)",opacity:hov?1:0.4,transition:"opacity .3s"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div style={{flex:1,marginRight:12,minWidth:0}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:9}}>
            <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,background:sc.bg,color:sc.c}}>{idea.status.toUpperCase()}</span>
            <Pill>{idea.industry}</Pill>
          </div>
          <h3 style={{fontSize:14,fontWeight:700,color:"var(--text)",lineHeight:1.35,fontFamily:"var(--fd)",letterSpacing:-0.2,wordBreak:"break-word"}}>{idea.title}</h3>
        </div>
        <ScoreArc score={idea.aiScore} size={50}/>
      </div>
      <p style={{fontSize:12,color:"var(--text2)",lineHeight:1.65,marginBottom:12}}>{idea.problem.slice(0,90)}...</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
        {(idea.tags||[]).slice(0,3).map(function(t){return <Pill key={t} accent="rgba(167,139,250,.6)">{"#"+t}</Pill>;})}
      </div>
      <div style={{height:1,background:"rgba(255,255,255,0.05)",margin:"0 0 12px"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <Av initials={(idea.author||"?").split(" ").map(function(n){return n[0];}).join("")} size={26} role={idea.authorRole}/>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text)"}}>{idea.author}</div>
            <div style={{fontSize:10,color:roleColor[idea.authorRole]}}>{idea.authorRole}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,fontSize:11,color:"var(--text3)"}}>
          <span>{"👁 "+idea.views.toLocaleString()}</span>
          <span style={{color:"var(--accent3)"}}>{"✓ "+pct+"%"}</span>
          <span>{"💬 "+((idea.comments||[]).length)}</span>
        </div>
      </div>
    </div>
  );
}

// -- Idea Detail ----------------------------------------------------------
function IdeaDetail({idea,user,onBack,onVote,onComment,onLike,onCollab}){
  const [tab,setTab]=useState("overview");
  const [comment,setComment]=useState("");
  const [replyTo,setReplyTo]=useState(null);
  const [replyText,setReplyText]=useState("");
  const [voted,setVoted]=useState(null);
  const [collabRole,setCollabRole]=useState("");
  const [collabMsg,setCollabMsg]=useState("");
  const [collabSent,setCollabSent]=useState(false);
  const [aiState,setAiState]=useState({});
  const [aiLoading,setAiLoading]=useState({});

  const fetchAI=async function(type){
    if(aiLoading[type]||aiState[type])return;
    setAiLoading(function(l){var n=Object.assign({},l);n[type]=true;return n;});
    const prompts={
      analysis:"Analyze startup: "+idea.title+"\nProblem: "+idea.problem+"\nSolution: "+idea.solution+"\nMarket: "+idea.marketSize+"\n\nVenture analysis with 3 strengths, 3 risks, main competitive threat, contrarian insight. Under 300 words.",
      roadmap:"90-day roadmap for: "+idea.title+"\nProblem: "+idea.problem+"\n\nOrganize by Week 1-2 Foundation, Week 3-6 Build, Week 7-10 Launch, Week 11-12 Scale. Under 300 words.",
      suggestions:"5 improvements for: "+idea.title+"\nProblem: "+idea.problem+"\nMonetization: "+idea.monetization+"\n\nFocus on positioning, differentiation, revenue model. Under 280 words.",
      trends:"Market trends for "+idea.industry+" relevant to: "+idea.title+"\n\n5 trends with data points. Opportunity or risk for this startup. Under 280 words."
    };
    const t=await callAI(prompts[type]);
    setAiState(function(s){var n=Object.assign({},s);n[type]=t;return n;});
    setAiLoading(function(l){var n=Object.assign({},l);n[type]=false;return n;});
  };

  const handleVote=function(type){if(!voted){setVoted(type);onVote(idea.id,type);}};
  const handleComment=function(){if(comment.trim()){onComment(idea.id,comment);setComment("");}};
  const handleReply=function(){if(replyText.trim()){onComment(idea.id,replyText,replyTo);setReplyText("");setReplyTo(null);}};
  const handleCollab=function(){
    if(!collabRole){alert("Please select a role first.");return;}
    const ideaAuthor=SEED_USERS.find(function(u){return u.id===idea.authorId;})||{id:idea.authorId,name:idea.author,role:idea.authorRole,avatar:(idea.author||"?").split(" ").map(function(n){return n[0]||"";}).join("").slice(0,2)||"??"};
    onCollab(idea.id,collabRole,collabMsg||"Hi! I want to collaborate as a "+collabRole+".",ideaAuthor);
    setCollabSent(true);
  };

  const tabs=[{id:"overview",label:"Overview"},{id:"ai",label:"AI Report"},{id:"discuss",label:"Discussion ("+((idea.comments||[]).length)+")"},{id:"team",label:"Team"}];
  const voteOpts=[{key:"high",label:"High Potential",color:"var(--accent3)"},{key:"improve",label:"Needs Work",color:"#ffa94d"},{key:"notViable",label:"Not Viable",color:"var(--accent2)"}];
  const sc=statusCfg[idea.status]||statusCfg.New;

  return(
    <div className="page-enter" style={{maxWidth:900,margin:"0 auto"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,marginBottom:24,padding:"6px 0",transition:"color .2s"}}
        onMouseEnter={function(e){e.currentTarget.style.color="var(--text)";}} onMouseLeave={function(e){e.currentTarget.style.color="var(--text3);";}}>
        ← Back to Ideas
      </button>

      <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"var(--r3)",padding:"clamp(18px,4vw,30px)",marginBottom:16,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#a78bfa,#4f9fff,#4fffb0)"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:14,marginBottom:20}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:11}}>
              <span style={{padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700,background:sc.bg,color:sc.c}}>{idea.status.toUpperCase()}</span>
              <Pill>{idea.industry}</Pill>
            </div>
            <h1 style={{fontSize:"clamp(18px,3.5vw,24px)",fontWeight:700,color:"var(--text)",lineHeight:1.25,marginBottom:14,fontFamily:"var(--fd)",letterSpacing:-0.4,wordBreak:"break-word"}}>{idea.title}</h1>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Av initials={(idea.author||"?").split(" ").map(function(n){return n[0];}).join("")} size={36} role={idea.authorRole}/>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{idea.author}</div>
                <div style={{fontSize:11,color:roleColor[idea.authorRole]}}>{idea.authorRole+" · "+idea.createdAt}</div>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:16,alignItems:"center",flexShrink:0}}>
            <ScoreArc score={idea.aiScore} size={66} label="AI Score"/>
            <ScoreArc score={idea.validationScore} size={66} label="Community"/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {voteOpts.map(function(v){return(
            <button key={v.key} onClick={function(){handleVote(v.key);}}
              style={{padding:"9px 14px",borderRadius:10,cursor:voted?"default":"pointer",fontSize:12,fontWeight:600,transition:"all .2s",
                border:"1px solid "+(voted===v.key?v.color:"rgba(255,255,255,0.09)"),
                background:voted===v.key?v.color+"18":"rgba(255,255,255,0.03)",
                color:voted===v.key?v.color:"var(--text2)",opacity:voted&&voted!==v.key?0.5:1}}>
              {v.label+" ("+(idea.votes[v.key]+(voted===v.key?1:0))+")"}
            </button>
          );})}
        </div>
        {voted&&<div style={{marginTop:10,fontSize:12,color:"var(--accent3)"}}>Your vote was recorded. Thank you!</div>}
      </div>

      <div style={{display:"flex",gap:3,marginBottom:16,background:"rgba(255,255,255,0.025)",padding:4,borderRadius:"var(--r)",border:"1px solid var(--border)"}}>
        {tabs.map(function(t){return(
          <button key={t.id} onClick={function(){setTab(t.id);}}
            style={{flex:1,padding:"9px 8px",borderRadius:10,border:"none",cursor:"pointer",fontSize:"clamp(10px,2vw,12px)",fontWeight:600,transition:"all .2s",
              background:tab===t.id?"rgba(167,139,250,0.15)":"transparent",color:tab===t.id?"#a78bfa":"var(--text3)"}}>
            {t.label}
          </button>
        );})}
      </div>

      {tab==="overview"&&(
        <div style={{display:"grid",gap:10,animation:"fadeUp .3s ease"}}>
          {[{label:"Problem",text:idea.problem},{label:"Solution",text:idea.solution},{label:"Target Users",text:idea.targetUsers},{label:"Market Size",text:idea.marketSize},{label:"Monetization",text:idea.monetization}].map(function(item){return(
            <Card key={item.label}><SecLabel>{item.label}</SecLabel><p style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.75,margin:0}}>{item.text||"Not specified"}</p></Card>
          );})}
          <Card><SecLabel>Tags</SecLabel><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{(idea.tags||[]).map(function(t){return <Pill key={t} accent="rgba(167,139,250,.6)">{"#"+t}</Pill>;})}</div></Card>
          {(idea.seeking||[]).length>0&&(<Card><SecLabel>Seeking Collaborators</SecLabel><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{idea.seeking.map(function(r){return <span key={r} style={{padding:"5px 12px",borderRadius:10,background:(roleColor[r]||"#a78bfa")+"14",border:"1px solid "+(roleColor[r]||"#a78bfa")+"28",color:roleColor[r]||"#a78bfa",fontSize:12,fontWeight:600}}>{r}</span>;})}</div></Card>)}
        </div>
      )}

      {tab==="ai"&&(
        <div style={{display:"grid",gap:10,animation:"fadeUp .3s ease"}}>
          <Card>
            <SecLabel>Performance Metrics</SecLabel>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(100%,230px),1fr))",gap:"2px 28px"}}>
              <Bar label="Market Demand" val={idea.report.marketDemand} color="var(--accent3)"/>
              <Bar label="Monetization Potential" val={idea.report.monetization} color="#a78bfa"/>
              <Bar label="Scalability" val={idea.report.scalability} color="var(--accent4)"/>
              <Bar label="Success Probability" val={idea.report.success} color="var(--accent)"/>
              <Bar label="Competition (lower=better)" val={idea.report.competition} color="#fb923c"/>
              <Bar label="Investor Readiness" val={idea.report.investor} color="#f9a8d4"/>
            </div>
            <div style={{marginTop:14,padding:"10px 14px",background:"rgba(255,79,123,0.07)",borderRadius:10,border:"1px solid rgba(255,79,123,0.15)"}}>
              <span style={{fontSize:12,color:"var(--text2)"}}>Risk Level: </span>
              <span style={{fontSize:13,fontWeight:700,color:scoreColor(100-idea.report.risk)}}>{idea.report.risk+"% — "+(idea.report.risk<35?"Low":idea.report.risk<55?"Moderate":"High")+" Risk"}</span>
            </div>
          </Card>
          {(idea.report.competitors||[]).length>0&&(
            <Card><SecLabel>Competitors</SecLabel><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{idea.report.competitors.map(function(c){return <div key={c} style={{padding:"7px 13px",borderRadius:10,background:"rgba(255,79,123,0.08)",border:"1px solid rgba(255,79,123,0.18)",fontSize:12,color:"#ff7a9a",fontWeight:600}}>{c}</div>;})}</div></Card>
          )}
          {(idea.report.roadmap||[]).length>0&&(
            <Card><SecLabel>Suggested Roadmap</SecLabel>{idea.report.roadmap.map(function(step,i){return(
              <div key={i} style={{display:"flex",gap:12,marginBottom:11,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"rgba(167,139,250,0.15)",border:"1px solid rgba(167,139,250,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#a78bfa",flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,paddingTop:2}}>{step}</span>
              </div>
            );})}</Card>
          )}
          {(idea.report.stack||[]).length>0&&(
            <Card><SecLabel>Tech Stack</SecLabel><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{idea.report.stack.map(function(t){return <div key={t} style={{padding:"7px 13px",borderRadius:10,background:"rgba(79,159,255,0.08)",border:"1px solid rgba(79,159,255,0.18)",fontSize:12,color:"#7ab8ff",fontWeight:600}}>{t}</div>;})}</div></Card>
          )}
          {[{key:"analysis",label:"Deep AI Analysis",hint:"Venture-grade strengths, risks and competitive analysis"},
            {key:"roadmap",label:"Custom 90-Day Roadmap",hint:"Step-by-step execution plan"},
            {key:"suggestions",label:"AI Improvement Suggestions",hint:"5 actionable improvements"},
            {key:"trends",label:"Market Trend Analysis",hint:"Current trends for this sector"}
          ].map(function(sec){return(
            <div key={sec.key} style={{background:"rgba(167,139,250,0.04)",borderRadius:"var(--r2)",padding:"20px 22px",border:"1px solid rgba(167,139,250,0.12)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:10,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:13,color:"#a78bfa",fontWeight:700,marginBottom:3}}>{sec.label}</div>
                  {!aiState[sec.key]&&!aiLoading[sec.key]&&<div style={{fontSize:11,color:"var(--text3)"}}>{sec.hint}</div>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  {aiState[sec.key]&&<button onClick={function(){setAiState(function(s){var n=Object.assign({},s);delete n[sec.key];return n;});}} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:11}}>Regenerate</button>}
                  {!aiState[sec.key]&&!aiLoading[sec.key]&&<Btn onClick={function(){fetchAI(sec.key);}} style={{padding:"7px 14px",fontSize:11}}>Generate</Btn>}
                </div>
              </div>
              {aiLoading[sec.key]&&<Spinner/>}
              {aiState[sec.key]&&<p style={{fontSize:13,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>{aiState[sec.key]}</p>}
              {!aiState[sec.key]&&!aiLoading[sec.key]&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>Click Generate for AI-powered insights.</p>}
            </div>
          );})}
        </div>
      )}

      {tab==="discuss"&&(
        <div style={{animation:"fadeUp .3s ease"}}>
          <Card style={{marginBottom:14}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <Av initials={user.avatar} size={34} role={user.role}/>
              <div style={{flex:1}}>
                <textarea value={comment} onChange={function(e){setComment(e.target.value);}} placeholder="Share your thoughts, feedback, or expertise..." rows={3}
                  style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontSize:13,lineHeight:1.7,resize:"vertical",padding:"10px 12px",fontFamily:"var(--fb)"}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                  <span style={{fontSize:11,color:"var(--text3)"}}>{comment.length+"/500"}</span>
                  <Btn onClick={handleComment} disabled={!comment.trim()||comment.length>500} style={{padding:"8px 18px",fontSize:12}}>Post Comment</Btn>
                </div>
              </div>
            </div>
          </Card>
          {(idea.comments||[]).length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--text3)",fontSize:13}}>No comments yet. Be the first!</div>}
          {(idea.comments||[]).map(function(c){return(
            <div key={c.id} style={{marginBottom:12}}>
              <Card>
                <div style={{display:"flex",gap:10}}>
                  <Av initials={c.avatar} size={32} role="Founder"/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
                      <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{c.user}</span>
                      <span style={{fontSize:11,color:"var(--text3)"}}>{c.time}</span>
                    </div>
                    <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,margin:"0 0 10px",wordBreak:"break-word"}}>{c.text}</p>
                    <div style={{display:"flex",gap:14,alignItems:"center"}}>
                      <button onClick={function(){onLike(idea.id,c.id);}}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:c.liked?"#ff4f7b":"var(--text3)",display:"flex",alignItems:"center",gap:4}}>
                        {c.liked?"❤️":"🤍"} {c.likes}
                      </button>
                      <button onClick={function(){setReplyTo(replyTo===c.id?null:c.id);}}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:replyTo===c.id?"#a78bfa":"var(--text3)"}}>
                        Reply
                      </button>
                    </div>
                    {replyTo===c.id&&(
                      <div style={{marginTop:10,display:"flex",gap:8,alignItems:"flex-start"}}>
                        <Av initials={user.avatar} size={26} role={user.role}/>
                        <div style={{flex:1}}>
                          <textarea value={replyText} onChange={function(e){setReplyText(e.target.value);}} placeholder={"Reply to "+c.user+"..."} rows={2}
                            style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontSize:12,resize:"none",padding:"8px 10px",fontFamily:"var(--fb)"}}/>
                          <div style={{display:"flex",gap:8,marginTop:6}}>
                            <Btn onClick={handleReply} disabled={!replyText.trim()} style={{padding:"6px 14px",fontSize:11}}>Reply</Btn>
                            <Btn onClick={function(){setReplyTo(null);setReplyText("");}} variant="secondary" style={{padding:"6px 14px",fontSize:11}}>Cancel</Btn>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </Card>
              {(c.replies||[]).map(function(r){return(
                <div key={r.id} style={{marginLeft:"clamp(20px,5vw,42px)",marginTop:8,background:"rgba(255,255,255,0.015)",borderRadius:12,padding:"13px 16px",border:"1px solid rgba(255,255,255,0.04)"}}>
                  <div style={{display:"flex",gap:8}}>
                    <Av initials={r.avatar} size={26} role="Developer"/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4,marginBottom:5}}>
                        <span style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{r.user}</span>
                        <span style={{fontSize:11,color:"var(--text3)"}}>{r.time}</span>
                      </div>
                      <p style={{fontSize:12.5,color:"var(--text2)",lineHeight:1.65,margin:"0 0 6px",wordBreak:"break-word"}}>{r.text}</p>
                      <button onClick={function(){onLike(idea.id,c.id,r.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:r.liked?"#ff4f7b":"var(--text3)",display:"flex",alignItems:"center",gap:3}}>{r.liked?"❤️":"🤍"} {r.likes}</button>
                    </div>
                  </div>
                </div>
              );})}
            </div>
          );})}
        </div>
      )}

      {tab==="team"&&(
        <div style={{animation:"fadeUp .3s ease",display:"grid",gap:12}}>
          <Card>
            <SecLabel>Join This Startup</SecLabel>
            {(idea.seeking||[]).length>0?(
              <>
                <p style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>Select a role and send a collaboration request:</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                  {idea.seeking.map(function(role){return(
                    <button key={role} onClick={function(){setCollabRole(collabRole===role?"":role);}}
                      style={{padding:"9px 16px",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:13,transition:"all .2s",
                        border:"1px solid "+(collabRole===role?roleColor[role]||"#a78bfa":"rgba(255,255,255,0.09)"),
                        background:collabRole===role?(roleColor[role]||"#a78bfa")+"18":"rgba(255,255,255,0.03)",
                        color:collabRole===role?roleColor[role]||"#a78bfa":"var(--text2)"}}>
                      {(collabRole===role?"✓ ":"")+role}
                    </button>
                  );})}
                </div>
                {collabRole&&!collabSent&&(
                  <>
                    <textarea value={collabMsg} onChange={function(e){setCollabMsg(e.target.value);}} placeholder={"Tell "+idea.author+" why you are a great "+collabRole+"..."} rows={3}
                      style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontSize:13,resize:"none",padding:"10px 12px",marginBottom:10,fontFamily:"var(--fb)"}}/>
                    <Btn onClick={handleCollab} style={{width:"100%",padding:"12px"}}>{"Send Request as "+collabRole}</Btn>
                  </>
                )}
                {collabSent&&<div style={{padding:"14px 18px",background:"rgba(79,255,176,0.08)",borderRadius:12,border:"1px solid rgba(79,255,176,0.2)",color:"var(--accent3)",fontSize:13,fontWeight:600}}>{"Request sent to "+idea.author+"!"}</div>}
              </>
            ):<p style={{fontSize:13,color:"var(--text3)"}}>This idea is not currently seeking collaborators.</p>}
          </Card>
          <Card>
            <SecLabel>AI Co-founder Matches</SecLabel>
            {SEED_USERS.filter(function(u){return u.id!==idea.authorId;}).slice(0,4).map(function(u,i){return(
              <div key={u.id} style={{display:"flex",gap:12,alignItems:"center",padding:"13px 0",borderBottom:i<3?"1px solid rgba(255,255,255,0.04)":"none"}}>
                <Av initials={u.avatar} size={40} role={u.role}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{u.name}</div>
                  <div style={{fontSize:11,color:roleColor[u.role],marginBottom:5}}>{u.role+" · "+u.country}</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{u.skills.slice(0,2).map(function(s){return <Pill key={s}>{s}</Pill>;})}</div>
                </div>

                  <button onClick={function(e){e.stopPropagation();onCollab(idea.id,u.role,"Hi "+u.name+"! I saw you matched with my idea and wanted to connect.",u);}}

          </Card>

      )}
    </div>

}

function SubmitIdea({onSubmit,onCancel}){
  const [step,setStep]=useState(1);
  const [submitting,setSubmitting]=useState(false);
  const [form,setForm]=useState({title:"",problem:"",solution:"",targetUsers:"",marketSize:"",monetization:"",industry:"FinTech",tags:"",seeking:[]});
  const [errors,setErrors]=useState({});
  const [preAnalysis,setPreAnalysis]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const set=function(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});setErrors(function(e){var n=Object.assign({},e);n[k]="";return n;});};
  const validateStep1=function(){
    const e={};
    if(!form.title.trim())e.title="Title is required";
    else if(form.title.trim().length<10)e.title="Title needs at least 10 characters";
    if(!form.problem.trim())e.problem="Problem statement is required";
    else if(form.problem.trim().length<30)e.problem="Please describe in more detail (30+ chars)";
    if(!form.solution.trim())e.solution="Solution is required";
    else if(form.solution.trim().length<30)e.solution="Please describe in more detail (30+ chars)";
    setErrors(e);return Object.keys(e).length===0;
  };
  const analyze=async function(){
    if(!form.title||!form.problem||analyzing)return;
    setAnalyzing(true);
    const t=await callAI("Quick startup validation for: "+form.title+"\nProblem: "+form.problem+"\nSolution: "+form.solution+"\n\n1 biggest strength, 1 biggest risk, 3 critical questions. Under 200 words.");

        <div style={{display:"flex",gap:6,marginBottom:28}}>

// -- Explore --------------------------------------------------------------
function Explore({ideas,onIdeaClick}){
  const [q,setQ]=useState("");
  const [ind,setInd]=useState("All");
  const [status,setStatus]=useState("All");
  const [sort,setSort]=useState("trending");
  const industries=["All",...Array.from(new Set(ideas.map(function(i){return i.industry;})))];
  const filtered=ideas.filter(function(i){
    if(!q)return true;
    const ql=q.toLowerCase();
    return i.title.toLowerCase().indexOf(ql)>=0||i.problem.toLowerCase().indexOf(ql)>=0||(i.tags||[]).some(function(t){return t.toLowerCase().indexOf(ql)>=0;})||(i.author||"").toLowerCase().indexOf(ql)>=0;
  }).filter(function(i){return ind==="All"||i.industry===ind;}).filter(function(i){return status==="All"||i.status===status;}).sort(function(a,b){
    if(sort==="score")return b.aiScore-a.aiScore;
    if(sort==="views")return b.views-a.views;
    if(sort==="newest")return new Date(b.createdAt)-new Date(a.createdAt);
    return b.votes.high-a.votes.high;
  });
  const sS={padding:"10px 12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text2)",fontSize:12,cursor:"pointer"};
  return(
    <div className="page-enter">
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:700,color:"var(--text)",fontFamily:"var(--fd)",letterSpacing:-0.5,marginBottom:4}}>Explore Ideas</h2>
        <p style={{fontSize:13,color:"var(--text3)"}}>Discover, validate, and collaborate on the next big thing</p>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
        <input value={q} onChange={function(e){setQ(e.target.value);}} placeholder="Search ideas, tags, problems..." style={{flex:1,minWidth:200,padding:"10px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text)",fontSize:13}}/>
        <select value={ind} onChange={function(e){setInd(e.target.value);}} style={sS}>{industries.map(function(i){return <option key={i}>{i}</option>;})}</select>
        <select value={status} onChange={function(e){setStatus(e.target.value);}} style={sS}>{["All","Trending","Hot","New"].map(function(s){return <option key={s}>{s}</option>;})}</select>
        <select value={sort} onChange={function(e){setSort(e.target.value);}} style={sS}>
          <option value="trending">Trending</option><option value="score">AI Score</option><option value="views">Most Viewed</option><option value="newest">Newest</option>
        </select>
      </div>
      <div style={{fontSize:11,color:"var(--text3)",marginBottom:14}}>{filtered.length+" IDEA"+(filtered.length!==1?"S":"")+" FOUND"}</div>
      {filtered.length===0
        ?<div style={{textAlign:"center",padding:"60px 20px",color:"var(--text3)"}}><div style={{fontSize:32,marginBottom:12}}>🔍</div><div style={{fontSize:14}}>No ideas match your search</div></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,290px),1fr))",gap:14}}>{filtered.map(function(idea,i){return <IdeaCard key={idea.id} idea={idea} onClick={onIdeaClick} index={i}/>;})}</div>
      }
    </div>
  );
}

function MessagesPanel({convs,user,activeConv,setActiveConv,onSend,onClose}){
  const [draft,setDraft]=useState("");
  const [search,setSearch]=useState("");
  const msgEndRef=useRef(null);
  const inputRef=useRef(null);
  const conv=convs.find(function(c){return c.id===activeConv;})||(convs.length>0?convs[0]:null);
  const N={1:"Aria Chen",2:"Marcus Webb",3:"Sofia Reyes",4:"Kai Nakamura",5:"Zara Ahmed"};
  const RL={1:"Founder",2:"Developer",3:"Designer",4:"Investor",5:"Marketer"};
  const AV={1:"AC",2:"MW",3:"SR",4:"KN",5:"ZA"};
  const getOther=function(c){const id=c.participants.find(function(p){return p!==user.id;});return{id:id,name:N[id]||"User",role:RL[id]||"Founder",avatar:AV[id]||"??"}; };
  const filteredConvs=convs.filter(function(c){if(!search)return true;const o=getOther(c);return o.name.toLowerCase().indexOf(search.toLowerCase())>=0||c.ideaTitle.toLowerCase().indexOf(search.toLowerCase())>=0;});
  const handleSend=function(){
    if(!draft.trim()||!conv)return;
    onSend(conv.id,draft);
    setDraft("");
    setTimeout(function(){if(msgEndRef.current)msgEndRef.current.scrollIntoView({behavior:"smooth"});},50);
  };
  useEffect(function(){if(msgEndRef.current)msgEndRef.current.scrollIntoView({behavior:"smooth"});},[activeConv,conv?conv.messages.length:0]);
  useEffect(function(){if(inputRef.current&&activeConv)inputRef.current.focus();},[activeConv]);

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",pointerEvents:"none"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",pointerEvents:"all",backdropFilter:"blur(3px)"}}/>
      <div style={{position:"relative",pointerEvents:"all",width:"min(100vw,900px)",height:"min(100vh,600px)",display:"flex",borderRadius:"20px 20px 0 0",overflow:"hidden",border:"1px solid rgba(255,255,255,0.09)",borderBottom:"none",boxShadow:"0 -8px 48px rgba(0,0,0,0.6)"}}>
        <div style={{width:"clamp(180px,35%,260px)",background:"var(--bg2)",borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"14px 14px 10px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:14,fontWeight:700,color:"var(--text)",fontFamily:"var(--fd)"}}>Messages</div>
              <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:18,padding:"2px 6px"}}>×</button>
            </div>
            <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search..." style={{width:"100%",padding:"7px 10px",borderRadius:9,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"var(--text)",fontSize:12}}/>
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            {filteredConvs.length===0&&<div style={{padding:"24px 14px",textAlign:"center",fontSize:12,color:"var(--text3)"}}>No conversations yet</div>}
            {filteredConvs.map(function(c){
              const o=getOther(c);const isAct=c.id===activeConv;const rc=roleColor[o.role]||"#a78bfa";
              return(
                <div key={c.id} onClick={function(){setActiveConv(c.id);}} style={{padding:"11px 12px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)",background:isAct?"rgba(167,139,250,0.1)":"transparent",position:"relative",transition:"background .15s"}}>
                  {c.unread>0&&<div style={{position:"absolute",top:10,right:10,width:7,height:7,borderRadius:"50%",background:"#ff4f7b"}}/>}
                  <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,"+rc+"22,"+rc+"0a)",border:"1.5px solid "+rc+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:rc,flexShrink:0}}>{o.avatar}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                        <div style={{fontSize:12,fontWeight:700,color:isAct?"var(--text)":"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.name}</div>
                        <div style={{fontSize:10,color:"var(--text3)",flexShrink:0,marginLeft:4}}>{c.lastTime}</div>
                      </div>
                      <div style={{fontSize:10,color:"#a78bfa",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.ideaTitle}</div>
                      <div style={{fontSize:11,color:c.unread>0?"var(--text2)":"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:c.unread>0?600:400}}>{c.lastMsg}</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",background:"var(--bg)",minWidth:0}}>
          {!conv
            ?<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:24}}>
              <div style={{fontSize:36}}>💬</div>
              <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>Your Messages</div>
              <div style={{fontSize:12,color:"var(--text3)",textAlign:"center",maxWidth:240}}>Send a collaboration request to start a conversation.</div>
            </div>
            :<>
              <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>

              </div>
              <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
                <div style={{textAlign:"center",marginBottom:4}}>
                  <span style={{padding:"4px 12px",borderRadius:20,fontSize:10,background:"rgba(167,139,250,0.1)",color:"#a78bfa",border:"1px solid rgba(167,139,250,0.2)"}}>{"💡 "+conv.ideaTitle}</span>
                </div>
                {conv.messages.map(function(m){
                  const isMe=m.from===user.id;
                  const o=getOther(conv);const rc=roleColor[o.role]||"#a78bfa";
                  return(
                    <div key={m.id} style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",gap:8,alignItems:"flex-end",animation:"msgIn 0.2s ease both"}}>
                      {!isMe&&<div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,"+rc+"22,"+rc+"0a)",border:"1.5px solid "+rc+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:rc,flexShrink:0}}>{o.avatar}</div>}
                      <div style={{maxWidth:"72%"}}>
                        <div style={{padding:"10px 14px",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",fontSize:13,lineHeight:1.55,wordBreak:"break-word",
                          background:isMe?"linear-gradient(135deg,#a78bfa,#818cf8)":"rgba(255,255,255,0.07)",color:isMe?"#fff":"var(--text)"}}>
                          {m.text}
                        </div>
                        <div style={{fontSize:10,color:"var(--text3)",marginTop:3,display:"flex",alignItems:"center",gap:4,justifyContent:isMe?"flex-end":"flex-start"}}>
                          {m.time}{isMe&&<span style={{color:m.read?"#4fffb0":"var(--text3)"}}>{m.read?"✓✓":"✓"}</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
                <div ref={msgEndRef}/>
              </div>
              <div style={{padding:"12px 14px",borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",display:"flex",gap:8,alignItems:"flex-end",flexShrink:0}}>
                <textarea ref={inputRef} value={draft} onChange={function(e){setDraft(e.target.value);}}
                  onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}}}
                  placeholder={"Message "+getOther(conv).name+"..."}
                  rows={1} style={{flex:1,padding:"10px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.05)",color:"var(--text)",fontSize:13,resize:"none",lineHeight:1.5,fontFamily:"var(--fb)",maxHeight:100,overflowY:"auto"}}/>
                <button onClick={handleSend} disabled={!draft.trim()}
                  style={{width:40,height:40,borderRadius:12,border:"none",cursor:draft.trim()?"pointer":"not-allowed",flexShrink:0,
                    background:draft.trim()?"linear-gradient(135deg,#a78bfa,#818cf8)":"rgba(255,255,255,0.06)",
                    color:draft.trim()?"#fff":"var(--text3)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  &#10148;
                </button>
              </div>
            </>
          }
        </div>
      </div>
    </div>
  );
}

// -- Auth -----------------------------------------------------------------
function Auth({onLogin}){
  const [mode,setMode]=useState("login");
  const [form,setForm]=useState({name:"",email:"",password:"",role:"Founder",skills:"",country:"",bio:""});
  const [errors,setErrors]=useState({});
  const [submitting,setSubmitting]=useState(false);
  const set=function(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});setErrors(function(e){var n=Object.assign({},e);n[k]="";return n;});};
  const validate=function(){
    const e={};
    if(mode==="signup"){if(!form.name.trim())e.name="Name is required";}
    if(!form.email.trim())e.email="Email is required";
    else if(form.email.indexOf("@")<0||form.email.indexOf(".")<0)e.email="Valid email required";
    if(!form.password)e.password="Password is required";
    else if(mode==="signup"&&form.password.length<6)e.password="Password must be 6+ characters";
    setErrors(e);return Object.keys(e).length===0;
  };
  const handleSubmit=function(){
    if(!validate())return;setSubmitting(true);
    setTimeout(function(){
      if(mode==="login"){onLogin(SEED_USERS[0]);}
      else{onLogin({id:99,name:form.name.trim(),role:form.role,avatar:form.name.trim().split(" ").map(function(n){return n[0]||"";}).join("").slice(0,2).toUpperCase()||"U",country:form.country||"Global",skills:form.skills?form.skills.split(",").map(function(s){return s.trim();}).filter(Boolean):[],bio:form.bio||"New startup builder on LetsDoIt.",reputation:100,ideas:0,collabs:0});}
    },700);
  };
  const iS={width:"100%",padding:"13px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.04)",color:"var(--text)",fontSize:13.5,boxSizing:"border-box",transition:"border-color .2s"};
  const eS=Object.assign({},iS,{border:"1px solid rgba(255,79,123,0.5)"});
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"var(--bg)"}}>
      <div style={{position:"fixed",top:"15%",left:"5%",width:400,height:400,borderRadius:"50%",background:"rgba(167,139,250,.04)",filter:"blur(100px)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:"15%",right:"5%",width:350,height:350,borderRadius:"50%",background:"rgba(79,255,176,.03)",filter:"blur(80px)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:460,animation:"fadeUp .5s ease",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:"clamp(36px,8vw,50px)",fontWeight:700,fontFamily:"var(--fd)",letterSpacing:-2,background:"linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#4fffb0 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>LetsDoIt</div>
          <p style={{fontSize:13,color:"var(--text3)",fontStyle:"italic",fontFamily:"var(--fs)"}}>Where startup ideas become companies</p>
        </div>
        <div style={{background:"var(--bg3)",borderRadius:"var(--r3)",padding:"clamp(22px,4vw,32px)",border:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"1.5px",background:"linear-gradient(90deg,transparent,rgba(167,139,250,.5),transparent)"}}/>
          <div style={{display:"flex",background:"rgba(255,255,255,0.03)",borderRadius:12,padding:4,marginBottom:24}}>
            {["login","signup"].map(function(m){return <button key={m} onClick={function(){setMode(m);setErrors({});}} style={{flex:1,padding:"10px",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .2s",background:mode===m?"rgba(167,139,250,.15)":"transparent",color:mode===m?"#a78bfa":"var(--text3)"}}>{m==="login"?"Sign In":"Sign Up"}</button>;})}
          </div>
          <div style={{display:"grid",gap:10}}>
            {mode==="signup"&&<div><input value={form.name} onChange={function(e){set("name",e.target.value);}} placeholder="Full Name" style={errors.name?eS:iS}/>{errors.name&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.name}</div>}</div>}
            <div><input value={form.email} onChange={function(e){set("email",e.target.value);}} placeholder="Email address" style={errors.email?eS:iS}/>{errors.email&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.email}</div>}</div>
            <div><input type="password" value={form.password} onChange={function(e){set("password",e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleSubmit();}} placeholder="Password" style={errors.password?eS:iS}/>{errors.password&&<div style={{fontSize:11,color:"#ff4f7b",marginTop:3}}>{errors.password}</div>}</div>
            {mode==="signup"&&<>
              <select value={form.role} onChange={function(e){set("role",e.target.value);}} style={Object.assign({},iS,{background:"var(--bg2)",cursor:"pointer"})}>
                {["Founder","Developer","Designer","Marketer","Investor"].map(function(r){return <option key={r}>{r}</option>;})}
              </select>
              <input value={form.skills} onChange={function(e){set("skills",e.target.value);}} placeholder="Skills (e.g. React, Product)" style={iS}/>
              <input value={form.country} onChange={function(e){set("country",e.target.value);}} placeholder="Country" style={iS}/>
              <textarea value={form.bio} onChange={function(e){set("bio",e.target.value);}} placeholder="Short bio (optional)" rows={2} style={Object.assign({},iS,{resize:"none"})}/>
            </>}
            <button onClick={handleSubmit} disabled={submitting}
              style={{padding:"14px",borderRadius:12,border:"none",marginTop:4,cursor:submitting?"not-allowed":"pointer",fontWeight:700,fontSize:15,transition:"all .2s",background:submitting?"rgba(167,139,250,.4)":"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff"}}>
              {submitting?"Signing in...":(mode==="login"?"Sign In":"Create Account")}
            </button>
            {mode==="login"&&<button onClick={function(){setSubmitting(true);setTimeout(function(){onLogin(SEED_USERS[0]);},400);}} style={{padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.03)",color:"var(--text2)",cursor:"pointer",fontSize:13}}>Continue as Demo User</button>}
          </div>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"var(--text3)",marginTop:16}}>Join 12,000+ founders, builders and investors · Free forever</p>
      </div>
    </div>
  );
}

// -- Toast ----------------------------------------------------------------
function Toast({msg,type,onClose}){
  type=type||"success";
  useEffect(function(){const t=setTimeout(onClose,3500);return function(){clearTimeout(t);};});
  const cfg={success:{bg:"rgba(79,255,176,.1)",border:"rgba(79,255,176,.25)",c:"var(--accent3)"},error:{bg:"rgba(255,79,123,.1)",border:"rgba(255,79,123,.25)",c:"var(--accent2)"},info:{bg:"rgba(167,139,250,.1)",border:"rgba(167,139,250,.25)",c:"#a78bfa"}};
  const s=cfg[type]||cfg.success;
  return <div style={{padding:"11px 16px",borderRadius:12,background:s.bg,border:"1px solid "+s.border,color:s.c,fontSize:13,fontWeight:600,backdropFilter:"blur(20px)",animation:"slideDown .3s ease",display:"flex",alignItems:"center",gap:8,maxWidth:320,wordBreak:"break-word"}}>
    {msg}<button onClick={onClose} style={{background:"none",border:"none",color:s.c,cursor:"pointer",fontSize:14,marginLeft:4,opacity:0.6}}>×</button>
  </div>;
}

function App(){

    try{

      if(ver!==APP_VERSION){localStorage.clear();localStorage.setItem("ldi_version",APP_VERSION);return{user:null,ideas:SEED_IDEAS,convs:SEED_CONVS};}
      const u=localStorage.getItem("ldi_user");
      const id=localStorage.getItem("ldi_ideas");
      const cv=localStorage.getItem("ldi_convs");
      let pu=null,pi=SEED_IDEAS,pc=SEED_CONVS;
      try{if(u)pu=JSON.parse(u);}catch(e){}
      try{if(id)pi=JSON.parse(id);}catch(e){}
      try{if(cv)pc=JSON.parse(cv);}catch(e){}
      return{user:pu,ideas:pi,convs:pc};
    }catch(e){try{localStorage.clear();}catch(e2){}return{user:null,ideas:SEED_IDEAS,convs:SEED_CONVS};}
  };
  const saved=loadState();

  const [user,setUser]=useState(saved.user);
  const [page,setPage]=useState("explore");
  const [ideas,setIdeas]=useState(saved.ideas);
  const [convs,setConvs]=useState(saved.convs);
  const [activeConv,setActiveConv]=useState(null);
  const [showMessages,setShowMessages]=useState(false);
  const [selected,setSelected]=useState(null);
  const [toasts,setToasts]=useState([]);

  useEffect(function(){try{if(user)localStorage.setItem("ldi_user",JSON.stringify(user));else localStorage.removeItem("ldi_user");}catch(e){}
  },[user]);
  useEffect(function(){try{localStorage.setItem("ldi_ideas",JSON.stringify(ideas));}catch(e){}
  },[ideas]);
  useEffect(function(){try{localStorage.setItem("ldi_convs",JSON.stringify(convs));}catch(e){}
  },[convs]);
  useEffect(function(){if(selected){const f=ideas.find(function(i){return i.id===selected.id;});if(f)setSelected(f);}
  },[ideas]);

  const notify=function(msg,type){
    const id=Date.now();type=type||"success";
    setToasts(function(t){return [...t,{id,msg,type}];});
    setTimeout(function(){setToasts(function(t){return t.filter(function(x){return x.id!==id;});});},4500);
  };
  const navigate=function(pg,idea){
    setPage(pg);
    if(idea)setSelected(idea);
    else if(pg!=="detail")setSelected(null);
    window.scrollTo({top:0,behavior:"smooth"});
  };
  const handleSignOut=function(){setUser(null);setPage("explore");setSelected(null);try{localStorage.removeItem("ldi_user");}catch(e){}};
  const handleVote=function(ideaId,type){setIdeas(function(p){return p.map(function(i){if(i.id!==ideaId)return i;const v=Object.assign({},i.votes);v[type]=(v[type]||0)+1;return Object.assign({},i,{votes:v});});});notify("Vote recorded! +5 reputation","success");};
  const handleComment=function(ideaId,text,parentId){
    const nc={id:Date.now(),userId:user.id,user:user.name,avatar:user.avatar,text:text.trim(),likes:0,liked:false,time:"Just now",replies:[]};
    if(parentId){setIdeas(function(p){return p.map(function(i){if(i.id!==ideaId)return i;return Object.assign({},i,{comments:i.comments.map(function(c){if(c.id!==parentId)return c;return Object.assign({},c,{replies:[...c.replies,nc]});})});});});}
    else{setIdeas(function(p){return p.map(function(i){if(i.id!==ideaId)return i;return Object.assign({},i,{comments:[...i.comments,nc]});});});}
    notify("Comment posted! +10 reputation","success");
  };
  const handleLike=function(ideaId,commentId,replyId){
    setIdeas(function(p){return p.map(function(i){
      if(i.id!==ideaId)return i;
      return Object.assign({},i,{comments:i.comments.map(function(c){
        if(c.id!==commentId)return c;
        if(replyId){return Object.assign({},c,{replies:c.replies.map(function(r){if(r.id!==replyId)return r;return Object.assign({},r,{likes:r.liked?r.likes-1:r.likes+1,liked:!r.liked});})});}
        return Object.assign({},c,{likes:c.liked?c.likes-1:c.likes+1,liked:!c.liked});
      })});
    });});
  };
  const handleCollab=function(ideaId,role,message,otherUser){
    setIdeas(function(p){return p.map(function(i){if(i.id!==ideaId)return i;return Object.assign({},i,{collaborators:(i.collaborators||0)+1});});});
    if(otherUser&&message){
      const idea=ideas.find(function(i){return i.id===ideaId;});
      const exists=convs.find(function(c){return c.participants.indexOf(user.id)>=0&&c.participants.indexOf(otherUser.id)>=0&&c.ideaId===ideaId;});
      if(!exists){
        const nc={id:"c"+Date.now(),participants:[user.id,otherUser.id],ideaId:ideaId,ideaTitle:idea?idea.title:"",lastMsg:message,lastTime:"Just now",unread:0,messages:[{id:"m"+Date.now(),from:user.id,text:message,time:"Just now",read:true}]};
        setConvs(function(cv){return [nc,...cv];});
        setActiveConv(nc.id);setShowMessages(true);
        notify("Collaboration request sent! Chat opened.","success");return;
      }
    }
    notify("Collaboration request sent as "+role+"!","success");
  };
  const handleSendMessage=function(convId,text){
    if(!text.trim())return;
    const nm={id:"m"+Date.now(),from:user.id,text:text.trim(),time:"Just now",read:true};
    setConvs(function(cv){return cv.map(function(c){if(c.id!==convId)return c;return Object.assign({},c,{messages:[...c.messages,nm],lastMsg:text.trim(),lastTime:"Just now"});});});
  };
  const handleOpenConv=function(convId){
    setConvs(function(cv){return cv.map(function(c){if(c.id!==convId)return c;return Object.assign({},c,{unread:0,messages:c.messages.map(function(m){return Object.assign({},m,{read:true});})});});});
    setActiveConv(convId);setShowMessages(true);
  };
  const handleSubmitIdea=function(data){
    const ni=Object.assign({},data,{id:Date.now(),authorId:user.id,author:user.name,authorRole:user.role,votes:{high:0,improve:0,notViable:0},collaborators:0,views:1,comments:[],status:"New",createdAt:new Date().toISOString().slice(0,10),report:{marketDemand:data.aiScore||Math.floor(Math.random()*20+65),competition:Math.floor(Math.random()*30+45),monetization:Math.floor(Math.random()*20+65),scalability:Math.floor(Math.random()*20+65),risk:Math.floor(Math.random()*30+20),success:Math.floor(Math.random()*20+55),investor:Math.floor(Math.random()*30+45),competitors:[],trends:[],roadmap:[],stack:[]}});
    setIdeas(function(p){return [ni,...p];});
    setUser(function(u){return Object.assign({},u,{ideas:(u.ideas||0)+1,reputation:(u.reputation||0)+50});});
    notify("Idea submitted! AI analysis ready. +50 reputation","success");
    navigate("explore");
  };

  const totalUnread=convs.reduce(function(acc,c){return acc+(c.unread||0);},0);
  const navItems=[{id:"dashboard",label:"Home",icon:"⊞"},{id:"explore",label:"Explore",icon:"✦"},{id:"submit",label:"Launch",icon:"+"},{id:"messages",label:"Messages",icon:"✉"},{id:"profile",label:"Profile",icon:"◎"}];

  if(!user)return <Auth onLogin={function(u){setUser(u);setPage("explore");try{localStorage.setItem("ldi_user",JSON.stringify(u));}catch(e){}}}/>;

  // Hide loading screen
  if(typeof window.__hideLd==="function")window.__hideLd();

  return(
    <>
      <div style={{position:"fixed",top:"5%",left:"5%",width:500,height:500,borderRadius:"50%",background:"rgba(167,139,250,.018)",filter:"blur(130px)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:"10%",right:"5%",width:400,height:400,borderRadius:"50%",background:"rgba(79,255,176,.012)",filter:"blur(110px)",pointerEvents:"none",zIndex:0}}/>
      <nav style={{position:"sticky",top:0,zIndex:100,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(8,8,16,0.9)",backdropFilter:"blur(24px)"}}>
        <div style={{maxWidth:1400,margin:"0 auto",padding:"0 clamp(12px,3vw,24px)",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <button onClick={function(){navigate("dashboard");}} style={{background:"linear-gradient(135deg,#a78bfa,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",border:"none",cursor:"pointer",fontSize:19,fontWeight:700,fontFamily:"var(--fd)",letterSpacing:-0.8}}>LetsDoIt</button>
          <div style={{display:"flex",gap:2}}>
            {navItems.map(function(n){return(
              <button key={n.id} onClick={function(){if(n.id==="messages"){setShowMessages(true);setActiveConv(activeConv||(convs.length>0?convs[0].id:null));}else{navigate(n.id);}}}
                style={{padding:"7px 9px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all .2s",position:"relative",
                  background:(n.id==="messages"?showMessages:(page===n.id&&page!=="detail"))?"rgba(167,139,250,.12)":"transparent",
                  color:(n.id==="messages"?showMessages:(page===n.id&&page!=="detail"))?"#a78bfa":"rgba(240,240,248,.4)"}}>
                <span style={{marginRight:3}}>{n.icon}</span><span className="nav-text">{n.label}</span>
                {n.id==="messages"&&totalUnread>0&&<span style={{position:"absolute",top:3,right:3,width:8,height:8,borderRadius:"50%",background:"#ff4f7b",border:"1px solid var(--bg)"}}/>}
              </button>
            );})}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span className="hide-mobile" style={{fontSize:12,color:"#fbbf24",fontWeight:700}}>{"⭐ "+user.reputation.toLocaleString()}</span>
            <button onClick={function(){navigate("profile");}} style={{background:"none",border:"none",cursor:"pointer",borderRadius:"50%",padding:0}}><Av initials={user.avatar} size={30} role={user.role}/></button>
          </div>
        </div>
      </nav>
      <div style={{position:"fixed",top:66,right:16,zIndex:999,display:"flex",flexDirection:"column",gap:8}}>
        {toasts.map(function(t){return <Toast key={t.id} msg={t.msg} type={t.type} onClose={function(){setToasts(function(ts){return ts.filter(function(x){return x.id!==t.id;});});}}/>;})}</div>
      <main style={{width:"100%",maxWidth:1400,margin:"0 auto",padding:"24px clamp(12px,3vw,24px) 60px",position:"relative",zIndex:1}}>
        {page==="dashboard"&&<Dashboard user={user} ideas={ideas} onIdeaClick={function(idea){navigate("detail",idea);}} onSubmit={function(){navigate("submit");}}/>}
        {page==="explore"&&<Explore ideas={ideas} onIdeaClick={function(idea){navigate("detail",idea);}}/>}
        {page==="submit"&&<SubmitIdea onSubmit={handleSubmitIdea} onCancel={function(){navigate("explore");}}/>}
        {page==="profile"&&<Profile user={user} onSignOut={handleSignOut}/>}
        {page==="detail"&&selected&&<IdeaDetail idea={selected} user={user} onBack={function(){navigate("explore");}} onVote={handleVote} onComment={handleComment} onLike={handleLike} onCollab={handleCollab}/>}
      </main>
      <footer style={{borderTop:"1px solid rgba(255,255,255,0.04)",padding:"16px 20px",textAlign:"center",position:"relative",zIndex:1}}>
        <span style={{fontSize:10,color:"var(--text3)",letterSpacing:0.8}}>LETSDOIT · AI-POWERED STARTUP COLLABORATION · WHERE IDEAS BECOME COMPANIES</span>
      </footer>
      {showMessages&&<MessagesPanel convs={convs} user={user} activeConv={activeConv} setActiveConv={function(id){handleOpenConv(id);}} onSend={handleSendMessage} onClose={function(){setShowMessages(false);}}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
 </html>
