async function callAI(prompt, sys) {
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:sys||"You are an elite startup advisor. Be sharp, concise, actionable.",
        messages:[{role:"user",content:prompt}]})
    });
    const d = await r.json();
    return d.content?.[0]?.text||"";
  } catch(e) { return "AI service unavailable. Please try again."; }
}

const scoreColor = s => s>=80?"#e8ff47":s>=60?"#ffa94d":"#ff4f7b";
const roleColor = {Founder:"#a78bfa",Developer:"#60a5fa",Designer:"#f9a8d4",Marketer:"#fb923c",Investor:"#fbbf24"};
const statusStyle = {

};

function ScoreArc({score, size=60, label}) {
  const r=size/2-6, c=2*Math.PI*r, col=scoreColor(score);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="4"
          strokeDasharray={c} strokeDashoffset={c-(score/100)*c} strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 5px ${col}88)`,transition:"all 1s ease"}}/>
        <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
          style={{fill:col,fontSize:size*0.21,fontWeight:700,fontFamily:"'Clash Display',sans-serif",
            transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`}}>{score}</text>
      </svg>
      {label&&<span style={{fontSize:9,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:1.5}}>{label}</span>}
    </div>
  );
}

function Pill({children, accent}) {
  return <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,letterSpacing:0.3,

    border:`1px solid ${accent?`${accent}28`:"rgba(255,255,255,0.08)"}`}}>{children}</span>;
}

function Av({initials, size=36, role}) {
  const c = roleColor[role]||"#a78bfa";
  return <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,
    background:`linear-gradient(135deg,${c}22,${c}0a)`,border:`1.5px solid ${c}44`,
    display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:size*0.34,fontWeight:700,color:c,letterSpacing:0.5}}>{initials}</div>;
}

function SubmitIdea({onSubmit, onCancel}) {
  const [step, setStep]=useState(1);
  const [form, setForm]=useState({title:"",problem:"",solution:"",targetUsers:"",marketSize:"",monetization:"",industry:"FinTech",tags:"",seeking:[]});
  const [preAnalysis, setPreAnalysis]=useState(null);
  const [analyzing, setAnalyzing]=useState(false);
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));

  const analyze = async()=>{
    setAnalyzing(true);
    const t = await callAI(`Quick validation for: "${form.title}"\nProblem: ${form.problem}\n\n1 biggest strength, 1 biggest risk, 3 critical questions to answer before building. Under 200 words. Direct.`);
    setPreAnalysis(t);
    setAnalyzing(false);
  };

  const iStyle = {width:"100%",padding:"12px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.03)",color:"var(--text)",fontSize:13.5,fontFamily:"var(--font-body)",boxSizing:"border-box"};
  const lStyle = {fontSize:10,fontWeight:700,color:"rgba(167,139,250,0.7)",letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:8};
  const btnPrimary = {padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:"var(--font-body)"};
  const btnSecondary = {padding:"13px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"none",color:"var(--text2)",cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"var(--font-body)"};

  return (
    <div style={{width:"100%",maxWidth:720,margin:"0 auto",animation:"fadeUp 0.35s ease"}}>
      <button onClick={onCancel} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13,marginBottom:28}}>← Cancel</button>
      <div style={{background:"var(--bg3)",borderRadius:24,padding:"36px 36px 32px",border:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#a78bfa,#4f9fff,#4fffb0)"}}/>
        <h2 style={{fontSize:24,fontWeight:700,color:"var(--text)",marginBottom:6,fontFamily:"var(--font-display)",letterSpacing:-0.5}}>Launch Your Idea</h2>
        <p style={{fontSize:13,color:"var(--text3)",marginBottom:28}}>AI will score and analyze your idea automatically</p>
        <div style={{display:"flex",gap:6,marginBottom:32}}>
          {[1,2,3].map(s=><div key={s} style={{flex:1,height:3,borderRadius:2,transition:"all 0.4s",background:step>=s?"linear-gradient(90deg,#a78bfa,#818cf8)":"rgba(255,255,255,0.07)"}}/>)}
        </div>
        {step===1&&(
          <div style={{display:"grid",gap:16,animation:"fadeUp 0.3s ease"}}>
            <div><label style={lStyle}>Idea Title *</label><input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="e.g. AI-powered X for Y" style={iStyle}/></div>
            <div><label style={lStyle}>Problem Statement *</label><textarea value={form.problem} onChange={e=>set("problem",e.target.value)} placeholder="What painful problem are you solving? Be specific." style={{...iStyle,resize:"vertical",minHeight:90}}/></div>
            <div><label style={lStyle}>Your Solution *</label><textarea value={form.solution} onChange={e=>set("solution",e.target.value)} placeholder="How does your product uniquely solve this?" style={{...iStyle,resize:"vertical",minHeight:90}}/></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(100%,220px),1fr))",gap:12}}>
              <div><label style={lStyle}>Target Users</label><input value={form.targetUsers} onChange={e=>set("targetUsers",e.target.value)} placeholder="Who benefits most?" style={iStyle}/></div>
              <div><label style={lStyle}>Industry</label>
                <select value={form.industry} onChange={e=>set("industry",e.target.value)} style={{...iStyle,background:"var(--bg2)"}}>
                  {["FinTech","LegalTech","HealthTech","EdTech","CleanTech","ProductivityTech","RetailTech","DeepTech","ConsumerTech"].map(i=><option key={i}>{i}</option>)}
                </select>
              </div>
            </div>
            <button onClick={()=>setStep(2)} style={btnPrimary}>Continue →</button>
          </div>
        )}
        {step===2&&(
          <div style={{display:"grid",gap:16,animation:"fadeUp 0.3s ease"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(100%,220px),1fr))",gap:12}}>
              <div><label style={lStyle}>Market Size</label><input value={form.marketSize} onChange={e=>set("marketSize",e.target.value)} placeholder="e.g. $5B TAM" style={iStyle}/></div>
              <div><label style={lStyle}>Tags (comma-separated)</label><input value={form.tags} onChange={e=>set("tags",e.target.value)} placeholder="AI, B2B, SaaS" style={iStyle}/></div>
            </div>
            <div><label style={lStyle}>Monetization Strategy</label><input value={form.monetization} onChange={e=>set("monetization",e.target.value)} placeholder="e.g. SaaS $49/month..." style={iStyle}/></div>
            <div>
              <label style={lStyle}>Team Roles Needed</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:2}}>
                {["Co-founder","Developer","Designer","Marketer"].map(r=>(
                  <button key={r} onClick={()=>set("seeking",form.seeking.includes(r)?form.seeking.filter(x=>x!==r):[...form.seeking,r])}
                    style={{padding:"9px 16px",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:13,transition:"all 0.2s",
                      border:`1px solid ${form.seeking.includes(r)?roleColor[r]||"#a78bfa":"rgba(255,255,255,0.09)"}`,
                      background:form.seeking.includes(r)?`${roleColor[r]||"#a78bfa"}14`:"rgba(255,255,255,0.03)",
                      color:form.seeking.includes(r)?roleColor[r]||"#a78bfa":"var(--text2)"}}>
                    {r}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,width:"100%"}}>
              <button onClick={()=>setStep(1)} style={btnSecondary}>← Back</button>
              <button onClick={()=>setStep(3)} style={btnPrimary}>Get AI Pre-Analysis →</button>
            </div>
          </div>
        )}
        {step===3&&(
          <div style={{display:"grid",gap:16,animation:"fadeUp 0.3s ease"}}>
            <div style={{padding:20,background:"rgba(167,139,250,0.05)",borderRadius:14,border:"1px solid rgba(167,139,250,0.12)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:13,color:"#a78bfa",fontWeight:700}}>✦ AI Pre-Validation</span>
                {!preAnalysis&&!analyzing&&<button onClick={analyze} style={{padding:"7px 14px",borderRadius:9,border:"1px solid rgba(167,139,250,0.3)",background:"rgba(167,139,250,0.1)",color:"#a78bfa",cursor:"pointer",fontSize:11,fontWeight:700}}>Analyze</button>}
              </div>
              {analyzing&&<AILoader text="Analyzing your idea..."/>}
              {preAnalysis&&<p style={{fontSize:13,color:"var(--text2)",lineHeight:1.85,whiteSpace:"pre-wrap",margin:0}}>{preAnalysis}</p>}
              {!preAnalysis&&!analyzing&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>Get instant AI feedback before submitting.</p>}
            </div>
            <div style={{padding:"16px 18px",background:"rgba(255,255,255,0.025)",borderRadius:12,border:"1px solid var(--border)"}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>📋 Submitting</div>
              <div style={{fontSize:15,fontWeight:700,color:"var(--text)",fontFamily:"var(--font-display)"}}>{form.title}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:3}}>{form.industry} · {form.marketSize||"Market TBD"}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,width:"100%"}}>
              <button onClick={()=>setStep(2)} style={btnSecondary}>← Back</button>
              <button onClick={()=>{if(form.title&&form.problem&&form.solution)onSubmit({...form,tags:form.tags.split(",").map(t=>t.trim()).filter(Boolean),aiScore:Math.floor(Math.random()*18+72),validationScore:Math.floor(Math.random()*18+67)});}}
                style={{...btnPrimary,background:"linear-gradient(135deg,var(--accent3),#00d4aa)",color:"#000"}}>
                🚀 Submit Idea
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Explore({ideas, onIdeaClick}) {
  const [q,setQ]=useState(""); const [ind,setInd]=useState("All"); const [status,setStatus]=useState("All"); const [sort,setSort]=useState("trending");
  const industries=["All",...new Set(ideas.map(i=>i.industry))];
  const filtered = ideas.filter(i=>!q||i.title.toLowerCase().includes(q.toLowerCase())||i.tags.some(t=>t.toLowerCase().includes(q.toLowerCase()))).filter(i=>ind==="All"||i.industry===ind).filter(i=>status==="All"||i.status===status).sort((a,b)=>sort==="score"?b.aiScore-a.aiScore:sort==="views"?b.views-a.views:sort==="newest"?new Date(b.createdAt)-new Date(a.createdAt):(b.votes.high-a.votes.high));
  const selStyle = {padding:"10px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text2)",fontSize:12,outline:"none",fontFamily:"var(--font-body)",cursor:"pointer"};
  return (
    <div>
      <div style={{marginBottom:26}}>
        <h2 style={{fontSize:26,fontWeight:700,color:"var(--text)",fontFamily:"var(--font-display)",letterSpacing:-0.5,marginBottom:4}}>Explore Ideas</h2>
        <p style={{fontSize:13,color:"var(--text3)"}}>Discover, validate, and collaborate on the next big thing</p>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search ideas, tags..."
          style={{flex:1,minWidth:200,padding:"10px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"var(--bg3)",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"var(--font-body)"}}/>
        <select value={ind} onChange={e=>setInd(e.target.value)} style={selStyle}>{industries.map(i=><option key={i}>{i}</option>)}</select>
        <select value={status} onChange={e=>setStatus(e.target.value)} style={selStyle}>{["All","Trending","Hot","New"].map(s=><option key={s}>{s}</option>)}</select>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={selStyle}><option value="trending">Trending</option><option value="score">AI Score</option><option value="views">Most Viewed</option><option value="newest">Newest</option></select>
      </div>
      <div style={{fontSize:11,color:"var(--text3)",marginBottom:16,letterSpacing:0.5}}>{filtered.length} IDEAS FOUND</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,300px),1fr))",gap:14}}>
        {filtered.map((idea,i)=><IdeaCard key={idea.id} idea={idea} onClick={onIdeaClick} index={i}/>)}
      </div>
    </div>
  );
}

function Dashboard({user, ideas, onIdeaClick}) {
  const [trends,setTrends]=useState(null); const [loadingTrends,setLoadingTrends]=useState(false);
  const fetchTrends=async()=>{setLoadingTrends(true);const t=await callAI("Top 5 startup sectors with highest growth potential in 2025. Sector name, 1-line reason, opportunity level. Sharp and brief.","You are a top-tier VC analyst.");setTrends(t);setLoadingTrends(false);};
  const trending=ideas.filter(i=>i.status==="Trending"); const needsVal=ideas.filter(i=>i.votes.high+i.votes.improve+i.votes.notViable<20);
  return (
    <div>
      <div style={{position:"relative",background:"linear-gradient(135deg,rgba(167,139,250,0.08),rgba(79,159,255,0.06))",border:"1px solid rgba(167,139,250,0.15)",borderRadius:22,padding:"28px 30px",marginBottom:24,overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:200,height:200,borderRadius:"50%",background:"rgba(167,139,250,0.06)",filter:"blur(50px)",pointerEvents:"none"}}/>
        <div style={{fontSize:10,color:"rgba(167,139,250,0.7)",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Welcome back</div>
        <h2 style={{fontSize:28,fontWeight:700,color:"var(--text)",fontFamily:"var(--font-display)",letterSpacing:-0.5,marginBottom:4}}>
          {user.name} <span style={{color:roleColor[user.role],fontSize:18,fontWeight:500,fontFamily:"var(--font-body)"}}>{user.role}</span>
        </h2>
        <div style={{display:"flex",gap:20,flexWrap:"wrap",marginTop:18}}>
          {[{label:"Reputation",value:user.reputation.toLocaleString(),icon:"⭐",color:"#fbbf24"},{label:"Ideas",value:user.ideas,icon:"💡",color:"#a78bfa"},{label:"Collabs",value:user.collabs,icon:"🤝",color:"var(--accent3)"}].map(s=>(
            <div key={s.label} style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:22}}>{s.icon}</span>
              <div>
                <div style={{fontSize:20,fontWeight:800,color:s.color,fontFamily:"var(--font-display)"}}>{s.value}</div>
                <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1}}>{s.label}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(100%,140px),1fr))",gap:10,marginBottom:24}}>
        {[{label:"Total Ideas",value:ideas.length,color:"#a78bfa"},{label:"Trending",value:trending.length,color:"var(--accent2)"},{label:"Need Validation",value:needsVal.length,color:"#fbbf24"},{label:"Seeking Team",value:ideas.filter(i=>i.seeking.length>0).length,color:"var(--accent3)"}].map(s=>(
          <div key={s.label} style={{background:"var(--bg3)",borderRadius:14,padding:"16px 18px",border:"1px solid var(--border)",textAlign:"center"}}>
            <div style={{fontSize:26,fontWeight:800,color:s.color,fontFamily:"var(--font-display)"}}>{s.value}</div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{background:"rgba(167,139,250,0.04)",borderRadius:18,padding:"22px 24px",border:"1px solid rgba(167,139,250,0.12)",marginBottom:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:13,color:"#a78bfa",fontWeight:700,marginBottom:3}}>✦ AI Trend Pulse</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>Live startup sector intelligence</div>
          </div>
          {!trends&&!loadingTrends&&(<button onClick={fetchTrends} style={{padding:"9px 18px",borderRadius:10,border:"1px solid rgba(167,139,250,0.3)",background:"rgba(167,139,250,0.1)",color:"#a78bfa",cursor:"pointer",fontSize:12,fontWeight:700}}>Get Trends</button>)}
        </div>
        {loadingTrends&&<AILoader text="Analyzing market trends..."/>}
        {trends&&<p style={{fontSize:13,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>{trends}</p>}
        {!trends&&!loadingTrends&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>Click to get live AI-powered sector trend analysis.</p>}
      </div>
      <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>🔥 Trending Ideas</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,300px),1fr))",gap:14,marginBottom:28}}>
        {trending.slice(0,4).map((idea,i)=><IdeaCard key={idea.id} idea={idea} onClick={onIdeaClick} index={i}/>)}
      </div>
      <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>🗳️ Needs Your Validation</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,300px),1fr))",gap:14}}>
        {needsVal.slice(0,2).map((idea,i)=><IdeaCard key={idea.id} idea={idea} onClick={onIdeaClick} index={i}/>)}
      </div>
    </div>
  );
}

function Profile({user}) {
  const [mentor,setMentor]=useState(null); const [loading,setLoading]=useState(false);
  const tier=user.reputation>=3000?{label:"Elite",color:"#fbbf24"}:user.reputation>=2000?{label:"Expert",color:"#a78bfa"}:{label:"Builder",color:"#60a5fa"};
  const fetchMentor=async()=>{setLoading(true);const t=await callAI(`Personal startup advice for: ${user.name}, ${user.role}, Skills: ${user.skills.join(", ")}, Reputation: ${user.reputation}\n\n3 growth opportunities, 1 skill gap, 1 startup idea to explore. Personal, sharp, under 250 words.`,"You are a world-class startup mentor.");setMentor(t);setLoading(false);};
  return (
    <div style={{width:"100%",maxWidth:720,margin:"0 auto"}}>
      <div style={{background:"var(--bg3)",borderRadius:22,padding:"30px",border:"1px solid var(--border)",marginBottom:16,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:"1px",background:"linear-gradient(90deg,transparent,rgba(167,139,250,0.4),transparent)"}}/>
        <div style={{display:"flex",gap:18,alignItems:"flex-start"}}>
          <div style={{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${roleColor[user.role]||"#a78bfa"}22,${roleColor[user.role]||"#a78bfa"}08)`,border:`2px solid ${roleColor[user.role]||"#a78bfa"}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:800,color:roleColor[user.role]||"#a78bfa",flexShrink:0}}>{user.avatar}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
              <h2 style={{fontSize:22,fontWeight:700,color:"var(--text)",fontFamily:"var(--font-display)",letterSpacing:-0.3}}>{user.name}</h2>
              <span style={{padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700,background:`${tier.color}14`,color:tier.color,border:`1px solid ${tier.color}28`}}>{tier.label}</span>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
              <span style={{color:roleColor[user.role]||"#a78bfa",fontWeight:600,fontSize:13}}>{user.role}</span>
              <span style={{color:"var(--text3)"}}>·</span>
              <span style={{color:"var(--text3)",fontSize:13}}>{user.country}</span>
            </div>
            <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.7,margin:0}}>{user.bio}</p>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(min(100%,120px),1fr))",gap:10,marginBottom:16}}>
        {[{label:"Reputation",value:user.reputation.toLocaleString(),icon:"⭐",color:"#fbbf24"},{label:"Ideas",value:user.ideas,icon:"💡",color:"#a78bfa"},{label:"Collabs",value:user.collabs,icon:"🤝",color:"var(--accent3)"}].map(s=>(
          <div key={s.label} style={{background:"var(--bg3)",borderRadius:14,padding:"16px",border:"1px solid var(--border)",textAlign:"center"}}>
            <div style={{fontSize:22,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:22,fontWeight:800,color:s.color,fontFamily:"var(--font-display)"}}>{s.value}</div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{background:"var(--bg3)",borderRadius:16,padding:"20px 22px",border:"1px solid var(--border)",marginBottom:12}}>
        <div style={{fontSize:10,color:"var(--text3)",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Skills</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {user.skills.map(s=><div key={s} style={{padding:"8px 16px",borderRadius:10,background:`${roleColor[user.role]||"#a78bfa"}10`,border:`1px solid ${roleColor[user.role]||"#a78bfa"}28`,color:roleColor[user.role]||"#a78bfa",fontWeight:600,fontSize:13}}>{s}</div>)}
        </div>
      </div>
      <div style={{background:"rgba(167,139,250,0.04)",borderRadius:16,padding:"22px 24px",border:"1px solid rgba(167,139,250,0.12)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:13,color:"#a78bfa",fontWeight:700,marginBottom:3}}>✦ AI Personal Mentor</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>Advice tailored to your profile</div>
          </div>
          {!mentor&&!loading&&<button onClick={fetchMentor} style={{padding:"8px 16px",borderRadius:9,border:"1px solid rgba(167,139,250,0.3)",background:"rgba(167,139,250,0.1)",color:"#a78bfa",cursor:"pointer",fontSize:11,fontWeight:700}}>Get Advice</button>}
        </div>
        {loading&&<AILoader text="Crafting personal advice..."/>}
        {mentor&&<p style={{fontSize:13,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>{mentor}</p>}
        {!mentor&&!loading&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>Get AI mentorship tailored to your startup journey.</p>}
      </div>
    </div>
  );
}

function Auth({onLogin}) {
  const [mode,setMode]=useState("login");
  const [form,setForm]=useState({name:"",email:"",password:"",role:"Founder",skills:"",country:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const iStyle={width:"100%",padding:"13px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.04)",color:"var(--text)",fontSize:13.5,fontFamily:"var(--font-body)",boxSizing:"border-box"};
  const handleSubmit=()=>{
    const u=mode==="login"?USERS[0]:{id:99,name:form.name,role:form.role,avatar:form.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()||"U",country:`🌍 ${form.country||"Global"}`,skills:form.skills.split(",").map(s=>s.trim()).filter(Boolean),bio:"New startup builder on LetsDoIt.",reputation:100,ideas:0,collabs:0};
    onLogin(u);
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",position:"relative"}}>
      <div style={{position:"fixed",top:"20%",left:"5%",width:400,height:400,borderRadius:"50%",background:"rgba(167,139,250,0.04)",filter:"blur(100px)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:"20%",right:"5%",width:350,height:350,borderRadius:"50%",background:"rgba(79,255,176,0.03)",filter:"blur(80px)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:480,animation:"fadeUp 0.5s ease"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:48,fontWeight:700,fontFamily:"var(--font-display)",letterSpacing:-2,background:"linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#4fffb0 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:10}}>LetsDoIt</div>
          <p style={{fontSize:13,color:"var(--text3)",fontStyle:"italic",fontFamily:"var(--font-serif)"}}>Where startup ideas become companies</p>
        </div>
        <div style={{background:"var(--bg3)",borderRadius:22,padding:"32px 30px",border:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"1.5px",background:"linear-gradient(90deg,transparent,rgba(167,139,250,0.5),transparent)"}}/>
          <div style={{display:"flex",background:"rgba(255,255,255,0.03)",borderRadius:12,padding:4,marginBottom:26}}>
            {["login","signup"].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"10px",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"var(--font-body)",transition:"all 0.2s",background:mode===m?"rgba(167,139,250,0.15)":"transparent",color:mode===m?"#a78bfa":"var(--text3)"}}>{m==="login"?"Sign In":"Sign Up"}</button>)}
          </div>
          <div style={{display:"grid",gap:12}}>
            {mode==="signup"&&<input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Full Name" style={iStyle}/>}
            <input value={form.email} onChange={e=>set("email",e.target.value)} placeholder="Email address" style={iStyle}/>
            <input type="password" value={form.password} onChange={e=>set("password",e.target.value)} placeholder="Password" style={iStyle}/>
            {mode==="signup"&&<>
              <select value={form.role} onChange={e=>set("role",e.target.value)} style={{...iStyle,background:"var(--bg2)"}}>{["Founder","Developer","Designer","Marketer","Investor"].map(r=><option key={r}>{r}</option>)}</select>
              <input value={form.skills} onChange={e=>set("skills",e.target.value)} placeholder="Skills (comma-separated)" style={iStyle}/>
              <input value={form.country} onChange={e=>set("country",e.target.value)} placeholder="Country" style={iStyle}/>
            </>}
            <button onClick={handleSubmit} style={{padding:"14px",borderRadius:12,border:"none",marginTop:4,background:"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:15,fontFamily:"var(--font-body)",boxShadow:"0 4px 20px rgba(167,139,250,0.25)"}}>
              {mode==="login"?"Sign In →":"Create Account →"}
            </button>
            {mode==="login"&&<button onClick={handleSubmit} style={{padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)",background:"rgba(255,255,255,0.03)",color:"var(--text2)",cursor:"pointer",fontSize:13,fontFamily:"var(--font-body)"}}>Continue as Demo User</button>}
          </div>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"var(--text3)",marginTop:20}}>Join 12,000+ founders, builders & investors</p>
      </div>
    </div>
  );
}

function Toast({msg, onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
  return <div style={{position:"fixed",top:70,right:16,zIndex:999,padding:"11px 18px",borderRadius:12,background:"rgba(79,255,176,0.1)",border:"1px solid rgba(79,255,176,0.25)",color:"var(--accent3)",fontSize:13,fontWeight:600,backdropFilter:"blur(20px)",animation:"slideDown 0.3s ease",display:"flex",alignItems:"center",gap:8}}>✓ {msg}</div>;
}

function App() {
  const [user,setUser]=useState(null); const [page,setPage]=useState("dashboard");
  const [ideas,setIdeas]=useState(IDEAS); const [selected,setSelected]=useState(null); const [toast,setToast]=useState(null);
  const notify=msg=>setToast(msg);
  const navItems=[{id:"dashboard",label:"Dashboard",icon:"⊞"},{id:"explore",label:"Explore",icon:"✦"},{id:"submit",label:"Submit",icon:"+"},{id:"profile",label:"Profile",icon:"◎"}];

  if(!user) return <Auth onLogin={setUser}/>;

  return (
    <>
      <div style={{position:"fixed",top:"5%",left:"5%",width:500,height:500,borderRadius:"50%",background:"rgba(167,139,250,0.02)",filter:"blur(120px)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:"10%",right:"5%",width:400,height:400,borderRadius:"50%",background:"rgba(79,255,176,0.015)",filter:"blur(100px)",pointerEvents:"none",zIndex:0}}/>
      <nav style={{position:"sticky",top:0,zIndex:100,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(8,8,16,0.88)",backdropFilter:"blur(24px)"}}>
        <div style={{maxWidth:1400,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58}}>
          <div style={{fontSize:20,fontWeight:700,fontFamily:"var(--font-display)",letterSpacing:-0.8,background:"linear-gradient(135deg,#a78bfa,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LetsDoIt</div>
          <div style={{display:"flex",gap:2}}>
            {navItems.map(n=><button key={n.id} onClick={()=>{setPage(n.id);setSelected(null);}} style={{padding:"7px 10px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all 0.2s",fontFamily:"var(--font-body)",background:page===n.id?"rgba(167,139,250,0.12)":"transparent",color:page===n.id?"#a78bfa":"rgba(240,240,248,0.38)"}}><span style={{marginRight:4}}>{n.icon}</span><span className="nav-label">{n.label}</span></button>)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,color:"#fbbf24",fontWeight:700}}>⭐ {user.reputation.toLocaleString()}</span>
            <Av initials={user.avatar} size={32} role={user.role}/>
          </div>
        </div>
      </nav>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      <main style={{width:"100%",maxWidth:1400,margin:"0 auto",padding:"24px 16px 40px",position:"relative",zIndex:1}}>
        {page==="dashboard"&&<Dashboard user={user} ideas={ideas} onIdeaClick={idea=>{setSelected(idea);setPage("detail");}}/>}
        {page==="explore"&&<Explore ideas={ideas} onIdeaClick={idea=>{setSelected(idea);setPage("detail");}}/>}
        {page==="submit"&&<SubmitIdea onSubmit={data=>{const ni={id:Date.now(),...data,authorId:user.id,author:user.name,authorRole:user.role,votes:{high:0,improve:0,notViable:0},collaborators:0,views:1,comments:[],status:"New",createdAt:new Date().toISOString().slice(0,10),report:{marketDemand:Math.floor(Math.random()*25+60),competition:Math.floor(Math.random()*35+40),monetization:Math.floor(Math.random()*25+60),scalability:Math.floor(Math.random()*25+60),risk:Math.floor(Math.random()*35+20),success:Math.floor(Math.random()*25+55),investor:Math.floor(Math.random()*35+40),competitors:[],trends:[],roadmap:[],stack:[]}};setIdeas(p=>[ni,...p]);notify("🚀 Idea submitted! AI analysis complete. +50 reputation");setPage("explore");}} onCancel={()=>setPage("explore")}/>}
        {page==="profile"&&<Profile user={user}/>}
        {page==="detail"&&selected&&<IdeaDetail idea={selected} user={user}
          onBack={()=>{setPage("explore");setSelected(null);}}
          onVote={(id,type)=>{setIdeas(p=>p.map(i=>i.id===id?{...i,votes:{...i.votes,[type]:i.votes[type]+1}}:i));notify("Vote recorded! +5 reputation");}}
          onComment={(id,text)=>{const nc={id:Date.now(),user:user.name,avatar:user.avatar,text,likes:0,time:"Just now",replies:[]};setIdeas(p=>p.map(i=>i.id===id?{...i,comments:[...i.comments,nc]}:i));setSelected(p=>({...p,comments:[...p.comments,nc]}));notify("Comment posted! +10 reputation");}}/>}
      </main>
      <footer style={{borderTop:"1px solid rgba(255,255,255,0.04)",padding:"18px 20px",textAlign:"center",marginTop:48,position:"relative",zIndex:1}}>
        <span style={{fontSize:11,color:"var(--text3)",letterSpacing:0.8}}>LETSDOIT · AI-POWERED STARTUP COLLABORATION · WHERE IDEAS BECOME COMPANIES</span>
      </footer>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
